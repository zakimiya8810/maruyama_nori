  /**
   * 再申請フォームを開く
   * @param {string} originalAppId - 元の申請ID
   */
  async function openResubmitForm(originalAppId) {
    showLoader(true, '再申請データを読み込み中...');
    try {
      const data = await runGas('getApplicationForResubmit', originalAppId);
      showLoader(false);

      if (!data) {
        alert('再申請データの取得に失敗しました');
        return;
      }

      const { applicationData, originalData, requiredFields, rejectReason, targetMaster, applicationType, customerId } = data;

      // 却下理由バナーのHTML
      const requiredFieldsText = requiredFields && requiredFields.length > 0
        ? requiredFields.join(', ')
        : '（指定なし）';
      const bannerHtml = `
        <div id="resubmit-banner" class="resubmit-info" style="margin-bottom: 16px;">
          <p><strong>却下理由:</strong> ${rejectReason || '（記載なし）'}</p>
          <p><strong>修正が必要な項目:</strong> ${requiredFieldsText}</p>
        </div>`;

      // 再申請フラグをセット（submitApplication で addApplication 後に markAsResubmit を呼ぶ）
      resubmitOriginalAppId = originalAppId;

      if (targetMaster === '単価マスタ') {
        // 単価マスタ：通常の価格変更フォームを流用し、却下申請の値で初期入力
        await showPriceForm(customerId);

        // バナーをフォームページの先頭に挿入
        const pricePage = document.getElementById('price-form-page');
        const existingBanner = pricePage.querySelector('#resubmit-banner');
        if (existingBanner) existingBanner.remove();
        pricePage.insertAdjacentHTML('afterbegin', bannerHtml);

        // 既存行の販売価格を却下申請時の値で上書き
        if (Array.isArray(applicationData)) {
          applicationData.forEach(item => {
            const productCode = String(item['商品コード'] || '').replace(/^'/, '').trim();
            const jissai = item['実際販売価格_修正後'];
            if (!productCode || jissai === undefined || jissai === '') return;
            document.querySelectorAll('.price-before-row[data-state="existing"]').forEach(row => {
              const rowCode = String(row.dataset.productCode || '').replace(/^'/, '').trim();
              if (rowCode === productCode) {
                const index = row.dataset.index;
                const afterRow = document.querySelector(`.price-after-row[data-index="${index}"]`);
                if (afterRow) {
                  const input = afterRow.querySelector('.price-jissai-input');
                  if (input) {
                    input.value = jissai;
                    recalculatePriceRowPair(index);
                  }
                }
              }
            });
          });

          // 新規追加商品行を生成してpre-fill
          const addedItems = applicationData.filter(item => item['登録区分'] === '追加');
          for (const item of addedItems) {
            const productCode = String(item['商品コード'] || '').replace(/^'/, '').trim();
            const jissai = item['実際販売価格_修正後'];
            if (!productCode) continue;

            const counterBefore = newPriceRowCounter;
            addNewPriceRowPair();
            const index = `new_${counterBefore}`;

            const beforeRow = document.querySelector(`.price-before-row[data-index="${index}"]`);
            if (!beforeRow) continue;

            const productCodeInput = beforeRow.querySelector(`input[name="productCode_${index}"]`);
            if (productCodeInput) {
              productCodeInput.value = productCode;
              lookupNewProductRow(index); // 商品名・上代価格を反映し jissai を有効化
            }

            if (jissai !== undefined && jissai !== '') {
              const afterRow = document.querySelector(`.price-after-row[data-index="${index}"]`);
              if (afterRow) {
                const jissaiInput = afterRow.querySelector('.price-jissai-input');
                if (jissaiInput) {
                  jissaiInput.value = jissai;
                  recalculateNewPriceRow(index);
                }
              }
            }
          }
        }

      } else {
        // 顧客マスタ：通常のフォームを流用し、却下申請のデータで初期入力
        const isNewRegistration = applicationType === '顧客新規登録';

        if (isNewRegistration) {
          // 新規登録再申請: 'new' モードで開く（customerNameはフォーム入力値から直接取得）
          // originalData は空（マスタ未登録）なので applicationData の内容でフォームを初期化
          const mergedData = { ...applicationData };
          await renderCustomerForm(mergedData, 'new');
        } else {
          // 修正申請再申請: 'edit' モードで開く
          // 得意先コードを clean な customerId に統一（'プレフィックス除去）
          const mergedData = { ...originalData, ...applicationData, '得意先コード': customerId };

          // handleApplicationSubmit が customerDetailCache[customerId] を参照するため、ここでセットしておく
          if (!customerDetailCache[customerId]) {
            customerDetailCache[customerId] = { basicInfo: { ...originalData, '得意先コード': customerId }, prices: [] };
          }

          await renderCustomerForm(mergedData, 'edit');
        }

        // バナーをフォームページの先頭に挿入
        const customerPage = document.getElementById('customer-form-page');
        const existingBanner = customerPage.querySelector('#resubmit-banner');
        if (existingBanner) existingBanner.remove();
        customerPage.insertAdjacentHTML('afterbegin', bannerHtml);

        showPage('customer-form-page');
      }

      setActiveNav('nav-applications');

    } catch (error) {
      showLoader(false);
      resubmitOriginalAppId = null;
      alert('エラー: ' + error.message);
    }
  }

  /**
   * 比較テーブルの行を描画
   * @param {Object} originalData - 元のデータ
   * @param {Object} modifiedData - 修正後のデータ
   * @param {Array} requiredFields - 修正指示項目（参考情報として表示）
   */
  function renderComparisonRows(originalData, modifiedData, requiredFields) {
    const tbody = document.getElementById('resubmit-comparison-body');
    tbody.innerHTML = '';

    const allKeys = new Set([...Object.keys(originalData), ...Object.keys(modifiedData)]);

    allKeys.forEach(key => {
      // 単価は別途処理するのでスキップ
      if (key === '単価') return;

      // 内部的な項目はスキップ
      if (['formMode', 'originalCustomerId', '申請者名', '申請者メール', '削除フラグ',
           'applicantName', 'applicantEmail', 'effectiveDate'].includes(key)) return;

      // ★修正: 修正指示項目かどうかをマーク表示用に判定（編集可否には影響しない）
      const isRequired = requiredFields && requiredFields.includes(key);
      const row = document.createElement('tr');

      // 修正指示項目には背景色をつける
      const keyClass = isRequired ? 'required-field' : '';
      const requiredBadge = isRequired ? '<span style="color: red; font-weight: bold;"> *</span>' : '';

      // ★修正: modifiedDataに存在する項目（変更された項目）はすべて編集可能にする
      const hasModifiedValue = modifiedData && modifiedData[key] !== undefined;

      row.innerHTML = `
        <td class="${keyClass}">${key}${requiredBadge}</td>
        <td>${originalData[key] || ''}</td>
        <td>
          ${hasModifiedValue
            ? `<input type="text" id="field-${key}" value="${modifiedData[key] || ''}" style="width:100%; padding: 5px;">`
            : (originalData[key] || '')
          }
        </td>
      `;

      tbody.appendChild(row);
    });
  }

  /**
   * 単価マスタの比較テーブルを描画
   * @param {Array} originalData - 元のデータ（単価マスタの現在値）
   * @param {Array} applicationData - 申請データ（商品ごとの修正前/修正後の値）
   * @param {Array} requiredFields - 修正指示項目（例: ["商品コード: 12345", "卸価格"]）
   */
  function renderPriceComparisonTable(originalData, applicationData, requiredFields) {
    const container = document.getElementById('price-resubmit-table-container');

    // 修正指示項目をパースして、商品コードと項目名に分解
    const requiredFieldsMap = {};
    requiredFields.forEach(field => {
      const match = field.match(/商品コード:\s*(\S+)/);
      if (match) {
        requiredFieldsMap[match[1]] = requiredFieldsMap[match[1]] || [];
      } else {
        // 項目名のみの場合（"卸価格"など）
        const lastKey = Object.keys(requiredFieldsMap).pop();
        if (lastKey) {
          requiredFieldsMap[lastKey].push(field);
        }
      }
    });

    // requiredFieldsから項目名を抽出（"商品コード: XXX"以外）
    const requiredItemNames = requiredFields.filter(f => !f.match(/商品コード:/));

    // テーブルHTML生成
    const priceHeaders = ['区分', '商品コード', '商品名', '上代価格', '販売価格', '掛率', '粗利率'];
    let tableHtml = `<div class="table-container"><table class="confirm-table"><thead><tr>${priceHeaders.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>`;

    applicationData.forEach((appItem, index) => {
      const productCode = appItem['商品コード'];
      const kubun = appItem['登録区分'] || '修正';

      let rowClass = '';
      switch(kubun) {
        case '追加': rowClass = 'diff-added'; break;
        case '修正': rowClass = 'diff-changed'; break;
        case '削除': rowClass = 'diff-deleted'; break;
      }

      // 元データ（単価マスタの現在値）を検索
      const originalItem = originalData.find(o => o.productCode === productCode) || {};

      // 各項目について、修正指示項目かどうかをチェック
      const fieldMap = {
        '商品名': { before: 'productName', after: '商品名_修正後', displayName: '商品名' },
        '上代価格': { before: 'oroshi', after: '卸価格_修正後', displayName: '上代価格' },
        '販売価格': { before: 'jissai', after: '実際販売価格_修正後', displayName: '販売価格' },
        '掛率': { before: 'kakeritsu', after: '掛率_修正後', displayName: '掛率' },
        '粗利率': { before: 'arari', after: '粗利率_修正後', displayName: '粗利率' }
      };

      let cellsHtml = `<td>${kubun}</td><td>${productCode}</td>`;

      // 商品名から粗利率までの各項目
      ['商品名', '上代価格', '販売価格', '掛率', '粗利率'].forEach(displayName => {
        const mapping = fieldMap[displayName];
        const originalValue = originalItem[mapping.before] || '';
        const appValue = appItem[mapping.after] || '';

        // ★修正: 修正指示項目かどうかをマーク表示用に判定（参考情報）
        const isRequired = requiredItemNames && requiredItemNames.some(reqField => reqField.includes(displayName));
        const requiredMark = isRequired ? ' *' : '';

        // 表示用にフォーマット
        const formatValue = (val, name) => {
          if (!val) return '';
          if (name === '上代価格' || name === '販売価格') {
            return `¥${Number(val).toLocaleString('ja-JP')}`;
          } else if (name === '掛率' || name === '粗利率') {
            return `${val}%`;
          }
          return val;
        };

        // ★修正: 追加・修正の場合は修正後の値が存在する項目をすべて編集可能にする
        const isEditable = (kubun === '追加' || kubun === '修正') && appValue !== '' && appValue !== null && appValue !== undefined;

        if (isEditable) {
          // 編集可能な入力フィールド（修正指示項目にはマーク付き）
          const fieldLabel = requiredMark ? `<span style="color:red;">*</span>` : '';
          cellsHtml += `<td>${fieldLabel}<input type="text" class="price-resubmit-input" data-product="${productCode}" data-field="${displayName}" value="${appValue}" style="width:100%; padding: 5px;"></td>`;
        } else {
          // 表示のみ（元の値と比較表示）
          const formattedOriginal = formatValue(originalValue, displayName);
          const formattedApp = formatValue(appValue, displayName);

          if (String(originalValue) !== String(appValue) && appValue !== '') {
            cellsHtml += `<td>${formattedApp} <small style="color:var(--danger-color); text-decoration:line-through;">(元: ${formattedOriginal})</small></td>`;
          } else {
            cellsHtml += `<td>${formattedApp || formattedOriginal}</td>`;
          }
        }
      });

      tableHtml += `<tr class="${rowClass}">${cellsHtml}</tr>`;
    });

    tableHtml += '</tbody></table></div>';
    container.innerHTML = tableHtml;
  }

  /**
   * 単価マスタの再申請を送信
   * @param {string} originalAppId - 元の申請ID
   * @param {Array} applicationData - 申請データ
   * @param {Array} requiredFields - 修正指示項目
   */
  async function submitPriceResubmitForm(originalAppId, applicationData, requiredFields) {
    // 入力フィールドから修正後のデータを収集
    const inputs = document.querySelectorAll('.price-resubmit-input');
    const modifiedData = {};

    inputs.forEach(input => {
      const productCode = input.dataset.product;
      const fieldName = input.dataset.field;
      const value = input.value;

      if (!modifiedData[productCode]) {
        modifiedData[productCode] = {};
      }
      modifiedData[productCode][fieldName] = value;
    });

    // 入力チェック（空欄がないか）
    let hasEmpty = false;
    inputs.forEach(input => {
      if (!input.value || input.value.trim() === '') {
        hasEmpty = true;
        input.style.border = '2px solid red';
      } else {
        input.style.border = '';
      }
    });

    if (hasEmpty) {
      alert('修正が必要な項目をすべて入力してください。');
      return;
    }

    // applicationDataを更新
    const updatedApplicationData = applicationData.map(item => {
      const productCode = item['商品コード'];
      if (modifiedData[productCode]) {
        const updated = { ...item };
        const fieldMap = {
          '商品名': '商品名_修正後',
          '上代価格': '卸価格_修正後',
          '販売価格': '実際販売価格_修正後',
          '掛率': '掛率_修正後',
          '粗利率': '粗利率_修正後'
        };

        Object.keys(modifiedData[productCode]).forEach(displayName => {
          const mappedField = fieldMap[displayName];
          if (mappedField) {
            updated[mappedField] = modifiedData[productCode][displayName];
          }
        });

        return updated;
      }
      return item;
    });

    // 再申請を送信
    showLoader(true, '再申請を送信中...');
    try {
      const result = await runGas('resubmitApplication', originalAppId, updatedApplicationData, currentUser.name, currentUser.email);
      showLoader(false);

      if (result.success) {
        alert('再申請が送信されました。');
        showApplicationListPage();
      } else {
        alert('再申請に失敗しました: ' + (result.message || '不明なエラー'));
      }
    } catch (error) {
      showLoader(false);
      alert('エラー: ' + error.message);
    }
  }

  /**
   * 再申請を送信（顧客マスタ）
   * @param {string} originalAppId - 元の申請ID
   * @param {Array} requiredFields - 修正指示項目（参考情報）

  async function submitResubmitForm(originalAppId, requiredFields) {
    const modifiedData = {};

    // ★修正: すべての入力フィールドから値を収集（requiredFieldsに関係なく）
    const inputs = document.querySelectorAll('#resubmit-comparison-body input[type="text"]');
    inputs.forEach(input => {
      const fieldName = input.id.replace('field-', '');
      modifiedData[fieldName] = input.value;
    });

    // ★修正: 入力チェック - 入力フィールドがあるのに空欄の場合は警告
    const emptyFields = [];
    inputs.forEach(input => {
      const fieldName = input.id.replace('field-', '');
      if (!input.value || input.value.trim() === '') {
        emptyFields.push(fieldName);
      }
    });

    if (emptyFields.length > 0) {
      alert('以下の項目を入力してください:\n' + emptyFields.join(', '));

    try {
      const result = await runGas('resubmitApplication', originalAppId, modifiedData, currentUser.name, currentUser.email);
      showLoader(false);

      if (result.success) {
        alert('再申請を送信しました: 申請ID ' + result.newApplicationId);

        alert('再申請に失敗しました: ' + result.message);

    } catch (error) {
      showLoader(false);
      alert('エラー: ' + error.message);
    }
  }

  /**
   * データをフィルタリングします
   */
  function filterDashboardData(data, division, dept, employee) {
    // ★修正: 元データを保護するため、配列をコピーしてからフィルタ
    let unvisited = [...(data.unvisitedCustomers || [])];
    let achievementByEmployee = [...((data.achievementData && data.achievementData.byEmployee) || [])];
    let rankAlert = [...(data.rankAlertCustomers || [])];
    let appointmentsByEmployee = [...((data.appointmentData && data.appointmentData.byEmployee) || [])];
    let purposeByEmployee = [...((data.purposeData && data.purposeData.byEmployee) || [])];

    // 大区分フィルタ
    if (division) {
      unvisited = unvisited.filter(c => c.division === division);
      achievementByEmployee = achievementByEmployee.filter(e => e.division === division);
      rankAlert = rankAlert.filter(c => c.division === division);
      appointmentsByEmployee = appointmentsByEmployee.filter(e => e.division === division);
      purposeByEmployee = purposeByEmployee.filter(e => e.division === division);
    }

    // 部署フィルタ
    if (dept) {
      unvisited = unvisited.filter(c => c.department === dept);
      achievementByEmployee = achievementByEmployee.filter(e => e.department === dept);
      rankAlert = rankAlert.filter(c => c.department === dept);
      appointmentsByEmployee = appointmentsByEmployee.filter(e => e.department === dept);
      purposeByEmployee = purposeByEmployee.filter(e => e.department === dept);
    }

    // 担当者フィルタ
    if (employee) {
      // 担当者名から担当者コードを取得
      const selectedEmployee = allEmployees.find(emp => emp.name === employee);
      const employeeCode = selectedEmployee ? selectedEmployee.code : null;

      unvisited = unvisited.filter(c => c.handler === employee);
      achievementByEmployee = achievementByEmployee.filter(e => e.name === employee);
      // 定期訪問未達リストは担当者コードで比較（得意先マスタの営業担当者コードと一致）
      if (employeeCode) {
        rankAlert = rankAlert.filter(c => c.handlerCode === employeeCode);
      } else {
        // 担当者コードが見つからない場合は担当者名で比較（フォールバック）
        rankAlert = rankAlert.filter(c => c.handler === employee);
      }
      appointmentsByEmployee = appointmentsByEmployee.filter(e => e.name === employee);
      purposeByEmployee = purposeByEmployee.filter(e => e.name === employee);
    }

    // ★ 追加: 期間フィルタ（今月/累計）
    achievementByEmployee = recalculateAchievementByPeriod(achievementByEmployee, currentAchievementPeriod, division, dept, employee);
    appointmentsByEmployee = recalculateAppointmentByPeriod(appointmentsByEmployee, currentAppointmentPeriod, division, dept, employee);
    purposeByEmployee = recalculatePurposeByPeriod(purposeByEmployee, currentPurposeType, currentPurposePeriod, division, dept, employee);

    // 達成率とアポイント件数を再計算（フィルタ後）
    const filteredAchievement = calculateFilteredAchievement(data, division, dept, employee);
    const filteredAppointments = calculateFilteredAppointments(data, division, dept, employee);

    return {
      unvisited,
      achievement: {
        ...filteredAchievement,
        byEmployee: achievementByEmployee,
        history: (data.achievementData && data.achievementData.history) || []
      },
      rankAlert,
      appointments: {
        ...filteredAppointments,
        byEmployee: appointmentsByEmployee,
        history: (data.appointmentData && data.appointmentData.history) || []

    // ★修正: byEmployeeの重複を除去（名前でユニーク化）
    const uniqueByEmployee = [];
    const seenNames = new Set();
    byEmployee.forEach(emp => {
      if (!seenNames.has(emp.name)) {
        seenNames.add(emp.name);
        uniqueByEmployee.push(emp);
      } else {
        console.log('  ⚠️ 重複従業員を除外:', emp.name);

    const result = uniqueByEmployee.map(emp => {
      const cc = v => String(v || '').replace(/^'/, '').trim();

      // 担当者名の正規化（trim + 全角スペース→半角）
      const empNameNorm = emp.name ? emp.name.replace(/　/g, ' ').trim() : '';
      const nameMatch = m => {
        const mName = m.handler ? m.handler.replace(/　/g, ' ').trim() : '';
        return mName === empNameNorm;
      };

      // 担当顧客へその担当者が訪問した商談（予定・実績件数の基準）

      // コードなし（旧データ）: 名前のみ一致
      const ownCustomerMeetings = allMeetings.filter(m => {
        if (cc(m.handlerCode) !== cc(emp.code)) return false;
        const mCode = cc(m.meetingHandlerCode);
        return mCode !== '' ? (mCode === cc(emp.code) && nameMatch(m)) : nameMatch(m);
      });

      // 延べ商談件数用：emp 自身が実施した全商談（他担当者の顧客への訪問も含む）
      // コードあり: コード AND 名前の両方が一致（コード引き継ぎ対策）
      // コードなし（旧データ）: 名前のみ一致
      const handlerMeetings = allMeetings.filter(m => {
        const mCode = cc(m.meetingHandlerCode);
        return mCode !== '' ? (mCode === cc(emp.code) && nameMatch(m)) : nameMatch(m);

          if (!m.scheduleDate) return false;

        });
        // ①修正: completedもactualDate基準に統一（目的・アポイントと整合）
        const completedMeetings = ownCustomerMeetings.filter(m => {
          if (!m.scheduleDate || !m.actualDate) return false;
          const date = new Date(m.actualDate);
          return date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth();
        });
        const actualMeetings = handlerMeetings.filter(m => {
          if (!m.actualDate) return false;
          const date = new Date(m.actualDate);
          return date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth();
        });

        const empScheduled = scheduledMeetings.length;
        const empCompleted = completedMeetings.length;
        const empTotalActual = actualMeetings.length;
        const empUnachieved = empScheduled - empCompleted;
        const empRate = empScheduled > 0 ? Math.round((empCompleted / empScheduled) * 100) : 0;

        return { ...emp, scheduled: empScheduled, completed: empCompleted, totalActual: empTotalActual, unachieved: empUnachieved, rate: empRate };
      } else {
        // 累計：期頭〜選択月末まで
        const fiscalYear = getFiscalYearRangeForDate(currentDashboardDate);
        const periodEnd = new Date(currentDashboardDate.getFullYear(), currentDashboardDate.getMonth() + 1, 0);
        const scheduledMeetings = ownCustomerMeetings.filter(m => {
          if (!m.scheduleDate) return false;
          const date = new Date(m.scheduleDate);
          return date >= fiscalYear.start && date <= periodEnd;
        });
        // ①修正: completedもactualDate基準に統一
        const completedMeetings = ownCustomerMeetings.filter(m => {
          if (!m.scheduleDate || !m.actualDate) return false;
          const date = new Date(m.actualDate);
          return date >= fiscalYear.start && date <= periodEnd;
        });
        const actualMeetings = handlerMeetings.filter(m => {
          if (!m.actualDate) return false;
          const date = new Date(m.actualDate);
          return date >= fiscalYear.start && date <= periodEnd;
        });

        const empScheduled = scheduledMeetings.length;
        const empCompleted = completedMeetings.length;
        const empTotalActual = actualMeetings.length;
        const empUnachieved = empScheduled - empCompleted;
        const empRate = empScheduled > 0 ? Math.round((empCompleted / empScheduled) * 100) : 0;

        return { ...emp, scheduled: empScheduled, completed: empCompleted, totalActual: empTotalActual, unachieved: empUnachieved, rate: empRate };
      }
    });

    console.log('  再計算結果:', result);
    return result;
  }

  /**

  function recalculateAppointmentByPeriod(byEmployee, period, division, dept, employee) {
    const allMeetings = dashboardData.allMeetings || [];

    const cc = v => String(v || '').replace(/^'/, '').trim();

    return byEmployee.map(emp => {

      const empNameNormA = emp.name ? emp.name.replace(/　/g, ' ').trim() : '';
      const nameMatchA = m => { const n = m.handler ? m.handler.replace(/　/g, ' ').trim() : ''; return n === empNameNormA; };
      const ownCustomerMeetings = allMeetings.filter(m => {

      });

      // 予定あり（scheduleDate）かつ実績あり（actualDate）の商談を期間フィルタ
      let filteredMeetings;
      if (period === 'monthly') {
        filteredMeetings = ownCustomerMeetings.filter(m => {
          if (!m.scheduleDate || !m.actualDate) return false;
          const date = new Date(m.actualDate);
          return date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth();
        });
      } else {
        const fiscalYear = getFiscalYearRangeForDate(currentDashboardDate);
        const periodEnd = new Date(currentDashboardDate.getFullYear(), currentDashboardDate.getMonth() + 1, 0);
        filteredMeetings = ownCustomerMeetings.filter(m => {
          if (!m.scheduleDate || !m.actualDate) return false;
          const date = new Date(m.actualDate);
          return date >= fiscalYear.start && date <= periodEnd;
        });
      }

      const empCompleted = filteredMeetings.length;

  /**
   * 指定日が属する会計年度の範囲を返します（6月1日〜翌年5月31日）
   */
  function getFiscalYearRangeForDate(date) {
    const year = date.getFullYear();
    const month = date.getMonth();
    if (month >= 5) {
      return { start: new Date(year, 5, 1), end: new Date(year + 1, 4, 31) };
    } else {
      return { start: new Date(year - 1, 5, 1), end: new Date(year, 4, 31) };
    }
  }

  /**
   * 今期の範囲を取得します（6月1日〜翌年5月31日）
   */
  function getFiscalYearRange() {
    return getFiscalYearRangeForDate(new Date());
  }

  /**
   * 商談達成率の月別履歴を再計算します（折れ線グラフ用）
   * ★修正: 担当者ごとに計算して集計することで、スコアカード・右側の表と同じロジックを使用
   */
  function recalculateAchievementHistory(division, dept, employee) {
    const cc = v => String(v || '').replace(/^'/, '').trim();

    // 表（recalculateAchievementByPeriod）と同じロジックで統一
    // Step1: m.division / m.department でフィルタ
    let meetings = dashboardData.allMeetings || [];
    if (division) {
      meetings = meetings.filter(m => m.division === division);
    }
    if (dept) {
      meetings = meetings.filter(m => m.department === dept);
    }

    // Step2: 担当者コードセットを作成（表の per-employee ループを集約したもの）
    const employees = dashboardData.employees || [];
    let empCodes, empNames;
    if (employee) {
      const empData = employees.find(e => e.name === employee);
      const empCode = empData ? cc(empData.code) : '';
      empCodes = new Set([empCode]);
      empNames = new Set([employee]);
    } else {
      empCodes = new Set(employees.map(e => cc(e.code)).filter(c => c));
      empNames = new Set(employees.map(e => e.name).filter(n => n));
    }

    // Step3: ownCustomerMeetings と同条件（handlerCode と meetingHandlerCode が同じ担当者）
    const customerMeetings = meetings.filter(m => {
      const hCode = cc(m.handlerCode);
      if (!empCodes.has(hCode)) return false;
      const mCode = cc(m.meetingHandlerCode);
      return mCode !== '' ? mCode === hCode : empNames.has(m.handler);
    });

    console.log('📈 [折れ線グラフ] recalculateAchievementHistory 開始');
    console.log('  フィルタ: division=' + division + ', dept=' + dept + ', employee=' + employee);
    console.log('  対象担当者数:', empCodes.size, ' / 担当顧客商談数:', customerMeetings.length);

    // 選択月が属する期の月別履歴を生成（期頭〜選択月末まで）
    const history = [];
    const fiscalYear = getFiscalYearRangeForDate(currentDashboardDate);
    const loopEnd = new Date(currentDashboardDate.getFullYear(), currentDashboardDate.getMonth() + 1, 0); // 選択月末日
    let loopDate = new Date(fiscalYear.start);

    while (loopDate <= loopEnd) {
      const year = loopDate.getFullYear();
      const month = loopDate.getMonth();
      const monthLabel = `${year}/${String(month + 1).padStart(2, '0')}`;

      // その月の予定と実績を計算
      const monthMeetings = customerMeetings.filter(m => {
        if (!m.scheduleDate) return false;
        const date = new Date(m.scheduleDate);
        return date.getFullYear() === year && date.getMonth() === month;
      });

      const scheduled = monthMeetings.length;
      const completed = monthMeetings.filter(m => m.actualDate).length;
      const rate = scheduled > 0 ? Math.round((completed / scheduled) * 100) : 0;

      history.push({ month: monthLabel, rate: rate });
      loopDate = new Date(year, month + 1, 1);
    }

    return history;
  }

  /**
   * ランクアラート顧客リストを描画します
   */
  function renderRankAlert(rankAlert) {
    const tbody = document.getElementById('rank-alert-tbody');

    if (!tbody) {
      console.log('ランクアラートテーブルが見つかりません（要素が存在しない可能性）');
      return;
    }

    // 選択月末日を基準に再計算
    const targetMonthEnd = new Date(currentDashboardDate.getFullYear(), currentDashboardDate.getMonth() + 1, 0);
    const fiscalYear = getFiscalYearRangeForDate(currentDashboardDate);

    // 期頭から選択月末までの経過月数（1始まり）
    const monthsElapsed = (currentDashboardDate.getFullYear() - fiscalYear.start.getFullYear()) * 12
      + (currentDashboardDate.getMonth() - fiscalYear.start.getMonth()) + 1;

    // 期間注記を更新
    const periodNote = document.getElementById('rank-alert-period-note');
    if (periodNote) {
      const fmt = d => `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
      periodNote.textContent = `※${fmt(fiscalYear.start)}～${fmt(targetMonthEnd)} の実績です。`;
    }

    // ランク要件マップをサーバーデータから構築
    const rankReqMap = {};
    (dashboardData.rankAlertCustomers || []).forEach(c => {
      if (!rankReqMap[c.rank]) rankReqMap[c.rank] = c.requiredCount;
    });

    const cleanCode = v => String(v || '').replace(/^'/, '').trim();
    const allMeetingsData = dashboardData.allMeetings || [];

    // allCustomers を使って選択月末時点の未達顧客を計算
    const computedAlert = (allCustomers || []).filter(c => !c.isHidden && rankReqMap[c.rank]).map(c => {
      // 期頭〜選択月末の訪問回数（meetingHandlerCode で照合）
      const visitCount = allMeetingsData.filter(m => {
        if (cleanCode(m.customerId) !== cleanCode(c.id) || !m.actualDate) return false;
        const d = new Date(m.actualDate);
        return d >= fiscalYear.start && d <= targetMonthEnd;
      }).length;

      // 年間目標を経過月で按分（切り上げ）
      const proRated = Math.ceil(rankReqMap[c.rank] * monthsElapsed / 12);
      if (visitCount >= proRated) return null;

      return {
        customerName: c.name,
        customerId: String(c.id || '').replace(/^'/, '').trim(),
        rank: c.rank,
        handler: c.handlerName || '-',
        handlerCode: c.handlerCode || '',
        department: c.department || '',
        division: (dashboardData.employees || []).find(e => cleanCode(e.code) === cleanCode(c.handlerCode))?.division || '',
        visitCount: visitCount,
        requiredCount: rankReqMap[c.rank]
      };
    }).filter(Boolean);

    // フィルタ（部署・担当者）を適用
    let displayAlert = computedAlert;
    if (currentDashboardFilters.division) {
      displayAlert = displayAlert.filter(c => c.division === currentDashboardFilters.division);
    }
    if (currentDashboardFilters.department) {
      displayAlert = displayAlert.filter(c => c.department === currentDashboardFilters.department);
    }
    if (currentDashboardFilters.employee) {
      displayAlert = displayAlert.filter(c => c.handler === currentDashboardFilters.employee);
    }

    if (displayAlert.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">該当データはありません</td></tr>';
      return;
    }

    tbody.innerHTML = displayAlert.map(c => `
      <tr style="cursor:pointer;" data-table-type="rankalert" data-customer-id="${c.customerId||''}" data-customer-name="${(c.customerName||'').replace(/"/g,'&quot;')}" data-handler-code="${c.handlerCode||''}" onclick="showDashboardRowPopup(this)">
        <td>${c.customerName}</td>
        <td>${c.rank}</td>
        <td>${c.handler}</td>
        <td>${c.visitCount}回</td>
        <td>${c.requiredCount}回/年</td>
      </tr>
    `).join('');
  }

  }

  /**
   * 商談目的データを期間・タイプで再計算します
   */
  function recalculatePurposeByPeriod(byEmployee, type, period, division, dept, employee) {
    let allMeetings = dashboardData.allMeetings || [];
    const now = currentDashboardDate;
    const purposeTypes = ['定期商談', 'プラスワン', 'クレーム対応', 'その他', '新規営業'];
    const cc = v => String(v || '').replace(/^'/, '').trim();

    // recalculateAchievementByPeriod と同様に大区分・部署フィルタを適用
    if (division) allMeetings = allMeetings.filter(m => m.division === division);
    if (dept) allMeetings = allMeetings.filter(m => m.department === dept);

    // byEmployeeの重複を除去（名前でユニーク化）
    const uniqueByEmployee = [];
    const seenNames = new Set();
    byEmployee.forEach(emp => {
      if (!seenNames.has(emp.name)) {
        seenNames.add(emp.name);
        uniqueByEmployee.push(emp);
      }
    });

    return uniqueByEmployee.map(emp => {
      // ③修正: コード AND 名前の両方一致（コード引き継ぎ対策）/ コードなしは名前のみ
      const empNameNormP = emp.name ? emp.name.replace(/　/g, ' ').trim() : '';
      const nameMatchP = m => { const n = m.handler ? m.handler.replace(/　/g, ' ').trim() : ''; return n === empNameNormP; };
      const ownCustomerMeetings = allMeetings.filter(m => {
        if (cc(m.handlerCode) !== cc(emp.code)) return false;
        const mCode = cc(m.meetingHandlerCode);
        return mCode !== '' ? (mCode === cc(emp.code) && nameMatchP(m)) : nameMatchP(m);
      });

      let filteredMeetings;
      if (period === 'monthly') {
        if (type === 'schedule') {
          filteredMeetings = ownCustomerMeetings.filter(m => {
            if (!m.scheduleDate) return false;
            const date = new Date(m.scheduleDate);
            return date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth();
          });
        } else {
          filteredMeetings = ownCustomerMeetings.filter(m => {
            if (!m.scheduleDate || !m.actualDate) return false;
            const date = new Date(m.actualDate);
            return date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth();
          });
        }
      } else {
        // ②修正: fiscalYear.end → periodEnd（選択月末）に統一
        const fiscalYear = getFiscalYearRangeForDate(currentDashboardDate);
        const periodEnd = new Date(currentDashboardDate.getFullYear(), currentDashboardDate.getMonth() + 1, 0);
        if (type === 'schedule') {
          filteredMeetings = ownCustomerMeetings.filter(m => {
            if (!m.scheduleDate) return false;
            const date = new Date(m.scheduleDate);
            return date >= fiscalYear.start && date <= periodEnd;
          });
        } else {
          filteredMeetings = ownCustomerMeetings.filter(m => {
            if (!m.scheduleDate || !m.actualDate) return false;
            const date = new Date(m.actualDate);
            return date >= fiscalYear.start && date <= periodEnd;
          });
        }
      }

      const purposes = {};
      purposeTypes.forEach(purpose => {
        purposes[purpose] = filteredMeetings.filter(m => m.purpose === purpose).length;
      });

      return { ...emp, purposes: purposes };
    });
  }

  /**
   * 商談目的の分布を計算します
   */
  function calculatePurposeDistribution(data, division, dept, employee) {
    const allMeetings = data.allMeetings || [];
    const now = currentDashboardDate;
    const purposeTypes = ['定期商談', 'プラスワン', 'クレーム対応', 'その他', '新規営業'];

    console.log('🔍 [商談目的円グラフ] calculatePurposeDistribution 開始');
    console.log('  全商談データ件数:', allMeetings.length);
    console.log('  期間:', currentPurposePeriod, '/ タイプ:', currentPurposeType);

    let filteredMeetings = allMeetings;

    // フィルタ適用
    if (division || dept || employee) {
      filteredMeetings = filteredMeetings.filter(m => {
        if (division && m.division !== division) return false;
        if (dept && m.department !== dept) return false;
        if (employee && m.handler !== employee) return false;
        return true;
      });
      console.log('  フィルタ後:', filteredMeetings.length, '件');
    }

    // 期間フィルタ
    if (currentPurposePeriod === 'monthly') {
      if (currentPurposeType === 'schedule') {
        filteredMeetings = filteredMeetings.filter(m => {
          if (!m.scheduleDate) return false;
          const date = new Date(m.scheduleDate);
          return date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth();
        });
      } else {
        filteredMeetings = filteredMeetings.filter(m => {
          if (!m.actualDate) return false;
          const date = new Date(m.actualDate);
          return date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth();
        });
      }
    } else {
      const fiscalYear = getFiscalYearRangeForDate(currentDashboardDate);
      if (currentPurposeType === 'schedule') {
        filteredMeetings = filteredMeetings.filter(m => {
          if (!m.scheduleDate) return false;
          const date = new Date(m.scheduleDate);
          return date >= fiscalYear.start && date <= fiscalYear.end;
        });
      } else {
        filteredMeetings = filteredMeetings.filter(m => {
          if (!m.actualDate) return false;
          const date = new Date(m.actualDate);
          return date >= fiscalYear.start && date <= fiscalYear.end;
        });
      }
    }

    console.log('  期間フィルタ後:', filteredMeetings.length, '件');

    const distribution = {};
    purposeTypes.forEach(purpose => {
      distribution[purpose] = filteredMeetings.filter(m => m.purpose === purpose).length;
    });

    console.log('  分布:', distribution);

    return distribution;
  }

  // ============================================================
  // ダッシュボード 商談詳細ポップアップ
  // ============================================================

  function showDashboardRowPopup(row) {
    const tableType   = row.dataset.tableType;
    const empCode     = row.dataset.empCode || '';
    const empName     = row.dataset.empName || '';
    const customerName = row.dataset.customerName || '';
    const customerId  = row.dataset.customerId || '';
    const handlerCode = row.dataset.handlerCode || '';

    let title, meetings;

    if (tableType === 'rankalert') {
      title = `${customerName} の商談履歴（今期）`;
      meetings = getDashboardMeetingsForCustomer(customerId, customerName, handlerCode);
    } else {
      const period = tableType === 'achievement' ? currentAchievementPeriod
                   : tableType === 'appointment' ? currentAppointmentPeriod
                   : currentPurposePeriod;
      const now = currentDashboardDate;
      const periodLabel = period === 'monthly'
        ? `${now.getFullYear()}年${now.getMonth() + 1}月`
        : '今期累計';
      title = `${empName} の商談一覧（${periodLabel}）`;
      meetings = getDashboardMeetingsForEmployee(empCode, empName, period);
    }

    showDashboardMeetingPopup(title, meetings);
  }

  function getDashboardMeetingsForEmployee(empCode, empName, period) {
    const allMeetings = dashboardData.allMeetings || [];
    const cc = v => String(v || '').replace(/^'/, '').trim();
    const empNameNorm = empName ? empName.replace(/　/g, ' ').trim() : '';
    const nameMatchFn = m => {
      const n = m.handler ? m.handler.replace(/　/g, ' ').trim() : '';
      return n === empNameNorm;
    };

    // コードあり: コード AND 名前一致 / コードなし: 名前のみ
    const handlerMeetings = allMeetings.filter(m => {
      const mCode = cc(m.meetingHandlerCode);
      return mCode !== '' ? (mCode === cc(empCode) && nameMatchFn(m)) : nameMatchFn(m);
    }).map(m => ({
      ...m,
      // 担当外顧客フラグ: 顧客マスタの担当者コードが自分と異なる場合
      _isOwnCustomer: cc(m.handlerCode) === cc(empCode)
    }));

    if (period === 'monthly') {
      const now = currentDashboardDate;
      return handlerMeetings.filter(m => {
        const dateStr = m.scheduleDate || m.actualDate;
        if (!dateStr) return false;
        const d = new Date(dateStr);
        return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
      });
    } else {
      const fy = getFiscalYearRangeForDate(currentDashboardDate);
      const periodEnd = new Date(currentDashboardDate.getFullYear(), currentDashboardDate.getMonth() + 1, 0);
      return handlerMeetings.filter(m => {
        const dateStr = m.scheduleDate || m.actualDate;
        if (!dateStr) return false;
        const d = new Date(dateStr);
        return d >= fy.start && d <= periodEnd;
      });
    }
  }

  function getDashboardMeetingsForCustomer(customerId, customerName, handlerCode) {
    const allMeetings = dashboardData.allMeetings || [];
    const cc = v => String(v || '').replace(/^'/, '').trim();
    const fy = getFiscalYearRangeForDate(currentDashboardDate);

    return allMeetings.filter(m => {
      // 顧客マッチ（コードまたは名前）
      const custMatch = customerId
        ? cc(m.customerId) === cc(customerId)
        : m.customerName === customerName;
      if (!custMatch) return false;

      // 担当者コードが一致（定期訪問未達リストの担当者コードと商談の担当者コードを照合）
      if (handlerCode) {
        const mCode = cc(m.meetingHandlerCode) || cc(m.handlerCode);
        if (mCode && mCode !== cc(handlerCode)) return false;
      }

      // 定期訪問未達リストは今期全体（期末まで）が対象
      const dateStr = m.actualDate || m.scheduleDate;
      if (!dateStr) return false;
      const d = new Date(dateStr);
      return d >= fy.start && d <= fy.end;
    }).sort((a, b) => (b.scheduleDate || '').localeCompare(a.scheduleDate || ''));
  }

  function showDashboardMeetingPopup(title, meetings) {
    document.getElementById('dashboard-meeting-popup-title').textContent = title;

    const sorted = [...meetings].sort((a, b) => {
      const da = a.scheduleDate || a.actualDate || '';
      const db = b.scheduleDate || b.actualDate || '';
      return db.localeCompare(da);
    });

    let html;
    if (sorted.length === 0) {
      html = '<p style="text-align:center;color:#757575;padding:24px;">該当する商談データはありません。</p>';
    } else {
      html = '<div style="overflow-x:auto;"><table class="main-table"><thead><tr><th>ステータス</th><th>商談予定日</th><th>商談実施日</th><th>企業名</th><th>ランク</th><th>担当者</th><th>商談目的</th></tr></thead><tbody>';
      const todayStr = new Date().toISOString().slice(0, 10);
      sorted.forEach(m => {
        // dashboardData.allMeetings には status フィールドがないため、日付から判定
        let computedStatus;
        if (m.actualDate) {
          computedStatus = (m.scheduleDate && m.actualDate > m.scheduleDate) ? 'delayed' : 'completed';
        } else if (m.scheduleDate && m.scheduleDate < todayStr) {
          computedStatus = 'overdue';
        } else {
          computedStatus = 'upcoming';
        }
        let statusText = '', statusColor = '';
        if (computedStatus === 'completed' || computedStatus === 'delayed') {
          statusText = '商談実績（済）'; statusColor = '#388e3c';
        } else if (computedStatus === 'overdue') {
          statusText = '未実施（期限超過）'; statusColor = '#d32f2f';
        } else {
          statusText = '予定'; statusColor = '#1976d2';
        }
        const badge = `<span style="background:${statusColor}20;color:${statusColor};padding:4px 8px;border-radius:4px;font-size:12px;font-weight:bold;display:inline-block;">${statusText}</span>`;
        const outsideLabel = (m._isOwnCustomer === false)
          ? ` <span style="background:#e0e0e0;color:#757575;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:bold;">担当外顧客</span>`
          : '';
        html += `<tr class="no-cursor"><td style="text-align:center;">${badge}</td><td>${m.scheduleDate||'-'}</td><td>${m.actualDate||'-'}</td><td>${m.customerName||'-'}${outsideLabel}</td><td>${m.rank||'-'}</td><td>${m.handler||'-'}</td><td>${m.purpose||'-'}</td></tr>`;
      });
      html += '</tbody></table></div>';
    }
    document.getElementById('dashboard-meeting-popup-body').innerHTML = html;
    document.getElementById('dashboard-meeting-popup').style.display = 'flex';
  }

</script>

  <div style="background:white;border-radius:8px;width:100%;max-width:1100px;padding:24px;position:relative;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:16px;">
      <h3 id="dashboard-meeting-popup-title" style="margin:0;font-size:1.1rem;"></h3>
      <button onclick="document.getElementById('dashboard-meeting-popup').style.display='none'" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:#555;line-height:1;padding:0 4px;flex-shrink:0;">✕</button>
    </div>
    <div id="dashboard-meeting-popup-body"></div>
  </div>
</div>
