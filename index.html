  /**
   * 承認段階を視覚的に表示するプログレスバーを生成
   * @param {string} currentStage - 現在の承認段階
   * @param {string} appStatus - 申請のステータス（却下判定用）
   * @param {object} data - 申請データ（各ステージの承認状態を含む）
   * @return {string} プログレスバーのHTML
   */
  function getApprovalProgress(currentStage, appStatus = '', data = {}) {
    const stages = [
      { name: '申請中', label: '申請', judgeKey: null }, // 申請は判定なし
      { name: '上長承認済', label: '上長', judgeKey: '上長承認' },
      { name: '管理承認済', label: '管理', judgeKey: '管理承認' },
      { name: '常務承認済', label: '常務', judgeKey: '常務承認' },
      { name: '決裁完了', label: '社長決裁', judgeKey: '社長承認' }
    ];

    let currentIndex = stages.findIndex(s => s.name === currentStage);
    if (currentIndex === -1) currentIndex = 0;

    const isRejected = appStatus === '却下' || currentStage === '却下';

    let html = '<div class="approval-progress">';
    stages.forEach((stage, index) => {
      let statusClass = '';
      let connectorClass = '';

      if (index === 0) {
        // 申請段階は常に青色
        statusClass = 'active';
        connectorClass = 'active';
      } else if (isRejected && stage.judgeKey) {
        // 却下の場合、各ステージの承認状態を確認
        const judgeResult = data[stage.judgeKey] || '';
        if (judgeResult === '承認済み') {
          // 承認済み（却下前に承認されたステージ）→ 青色
          statusClass = 'active';
          connectorClass = 'active';
        } else if (judgeResult === '却下') {
          // 却下したステージ → 赤色
          statusClass = 'rejected';
          connectorClass = 'rejected';
        } else {
          // 未処理 → グレー（デフォルト）
          statusClass = '';
          connectorClass = '';
        }
      } else {
        // 通常の承認フロー
        const isActive = index <= currentIndex;
        statusClass = isActive ? 'active' : '';
        connectorClass = isActive ? 'active' : '';
      }

      const isCurrent = index === currentIndex;
      const currentClass = isCurrent ? 'current' : '';

      html += `
        <div class="approval-stage ${statusClass} ${currentClass}">
          <div class="stage-circle">${index + 1}</div>
          <div class="stage-label">${stage.label}</div>
        </div>
      `;

      if (index < stages.length - 1) {
        html += `<div class="stage-connector ${connectorClass}"></div>`;
      }
    });
    html += '</div>';

    return html;
  }

/**
   * 商品登録修正フォーム表示前に、課税方式を取得し、originalPrices の構造を変更。
   * [修正] 実際価格(jissai)の参照元を kouri -> shiire に変更。
   */
  async function showPriceForm(customerId) {
      const _priceCustomer = allCustomers.find(c => String(c.id).replace(/^'/, '').trim() === String(customerId).replace(/^'/, '').trim());
      if (_priceCustomer && _priceCustomer.isHidden) {
          alert('OLD登録済みの顧客には商品登録/修正申請できません。');
          return;
      }
      // マスタデータが未ロードならエラー表示して中断
      if (!productMaster || productMaster.length === 0) {
          alert("エラー: 商品マスタが読み込まれていません。ページを再読み込みしてください。");
          showCustomerListPage(); // 一覧に戻る
          return;
      }
      if (!saitanMaster || Object.keys(saitanMaster).length === 0 || !fukuroMaster || Object.keys(fukuroMaster).length === 0) {
          alert("エラー: 裁断・袋詰マスタが読み込まれていません。ページを再読み込みしてください。");
          showCustomerListPage(); // 一覧に戻る
          return;
      }

      let data = customerDetailCache[customerId];
      if (!data) {
          try {
            showLoader(true, '顧客詳細データを取得中...');
            data = await runGas('getCustomerDetails', customerId);
            // 取得失敗時のハンドリングを追加
            if (!data || !data.basicInfo) {
                throw new Error("取得した顧客データが不正です。");
            }
            customerDetailCache[customerId] = data;
          } catch(e) {
              alert(`顧客詳細の取得に失敗しました: ${e.message}`);
              showCustomerListPage(); // エラー時は一覧に戻る
              return;
          } finally {
              showLoader(false);
          }
      }

      // 課税方式をグローバル変数に格納 (basicInfo の存在確認を追加)
      currentCustomerTaxType = data.basicInfo ? data.basicInfo['課税方式名称'] : '';
      if (!currentCustomerTaxType) {
          console.warn(`顧客 ${customerId} の課税方式名称が不明です。デフォルト(外税)の計算が適用されます。`);
          // currentCustomerTaxType = '外税'; // 必要ならデフォルトを設定
      }

      // originalPrices の構造を新しいフォーム/データ構造に合わせる
      // getPricesByCustomerId が返す { productCode, productName, oroshi, jissai, ... } を想定
      originalPrices = (data.prices || []).map(p => {
          const code = p.productCode;
          // 商品名、価格を商品マスタから再取得して整合性を取る
          const productInfo = productMaster.find(pm => String(pm.code) === String(code));
          const name = productInfo ? productInfo.name : (p.productName || '不明な商品'); // マスタにあればマスタ名、なければ元データ、それもなければ不明

          let oroshi = 0;
          let genka = 0; // 原価（商品マスタの仕入単価）
          if (productInfo) {
              if (currentCustomerTaxType === '内税') {
                  oroshi = parseFloat(productInfo.oroshi_tax_in) || 0;
                  genka = parseFloat(productInfo.shiire_tax_in) || 0;
              } else { // 外税 or 不明
                  oroshi = parseFloat(productInfo.oroshi) || 0;
                  genka = parseFloat(productInfo.shiire) || 0;
              }
          } else {
              // マスタにない場合、元の単価データを使う (フォールバック)
              oroshi = parseFloat(p.oroshi) || 0;
              genka = oroshi; // 商品マスタがない場合は上代価格をフォールバック
              console.warn(`商品マスタにコード ${code} が見つかりません。単価マスタの値を表示します。`);
          }

          // 販売価格は単価マスタのバラ単価を使用
          const jissai = parseFloat(p.jissai) || 0;

          // 掛率・粗利率を計算 (%なし)
          const kakeritsu = (oroshi > 0) ? ((jissai / oroshi) * 100).toFixed(1) : '';
          const arari = (jissai > 0) ? (((jissai - genka) / jissai) * 100).toFixed(1) : '';

          // 裁断・袋詰は元の単価データには含まれないため空で初期化
          // ※ getPricesByCustomerId で saitanCode, fukuroCode が空で返る想定
          return {
              productCode: code,
              productName: name,
              saitanCode: p.saitanCode || '',
              fukuroCode: p.fukuroCode || '',
              oroshi: oroshi,
              jissai: jissai,
              kakeritsu: kakeritsu,
              arari: arari,
              genka: genka, // 原価も保存
              biko1: p.biko1 || '',
              biko2: p.biko2 || ''
          };
      });

      // 顧客名も basicInfo の存在確認
      // ★ 追加: 前画面を記録（単価登録は必ず顧客詳細から呼ばれる）
      previousPage = 'customer-detail-page';
      previousPageData = customerId;
      renderPriceForm(customerId, data.basicInfo?.['得意先名称'] || customerId, originalPrices);
      showPage('price-form-page');
  }    
/**
   * 商品コード入力時に自動計算を実行する関数
   * [修正] 価格改定リストと登録有効日を考慮した価格計算ロジックに変更。
   * [修正] 実際価格の参照元を「小売単価」→「店頭仕入単価」に変更。
   * [修正] 実際価格(jissai)を <td> ではなく <input> にセットするよう変更。
   */
  function calculatePriceRow(inputElement) {
      const row = inputElement.closest('tr');
      if (!row) return; // 対象の行が見つからない場合は中断

      const productCode = inputElement.value.trim(); // 入力された商品コード

      const targetPriceSelect = document.getElementById('targetPrice');
      const targetPriceValue = targetPriceSelect ? targetPriceSelect.value : 'current';
      let formEffectiveDate = null;

      if (targetPriceValue && targetPriceValue !== 'current') {
          try {
              formEffectiveDate = new Date(targetPriceValue + 'T00:00:00'); // JSTで解釈させる
          } catch(e) { /* ignore */ }
      }

      // 行内の各要素を取得
      const productNameCell = row.querySelector('.product-name');
      const oroshiCell = row.querySelector('.oroshi-price');
      const jissaiInput = row.querySelector('.jissai-price-input'); 
      const kakeritsuCell = row.querySelector('.kakeritsu');
      const arariCell = row.querySelector('.arariritsu');

      // inputElement (商品コード) のエラー表示をリセット
      inputElement.classList.remove('is-invalid'); // エラークラスを削除
      
      // まず表示をクリア
      productNameCell.textContent = '';
      oroshiCell.textContent = '';
      if(jissaiInput) jissaiInput.value = '';
      kakeritsuCell.textContent = '';
      arariCell.textContent = '';

      // 商品コードが空なら何もしない
      if (!productCode) return;

      // --- 1. 商品マスタから基本情報を取得 (商品名は常にマスタ優先) ---
      const product = productMaster.find(p => String(p.code) === String(productCode) && !p.name?.startsWith('Ｏ＿'));

      if (!product) {
          // 商品マスタに見つからない場合
          productNameCell.textContent = productCode ? '商品不明' : '';
          inputElement.classList.add('is-invalid'); // エラー表示
          oroshiCell.textContent = '';
          if (jissaiInput) { jissaiInput.value = ''; jissaiInput.disabled = true; }
          kakeritsuCell.textContent = '';
          arariCell.textContent = '';
          return;
      }

      // 商品が有効なら入力を有効化
      if (jissaiInput) jissaiInput.disabled = false;
      // 商品名はマスタからセット
      productNameCell.textContent = product.name || '';

      // 未来の価格変更予定ラベルを付与
      {
        const _nc = v => String(v || '').replace(/^'/, '').trim().replace(/^0+/, '') || '0';
        const _today = new Date().toISOString().split('T')[0];
        const _fr = revisionList
          .filter(r => _nc(r.code) === _nc(productCode) && r.effectiveDate > _today)
          .sort((a, b) => a.effectiveDate.localeCompare(b.effectiveDate))[0];
        if (_fr) {
          const span = document.createElement('span');
          span.style.cssText = 'color:#1565c0;font-size:0.82rem;margin-left:6px;font-weight:500;';
          span.textContent = `※${_fr.effectiveDate} 価格変更対象商品`;
          productNameCell.appendChild(span);
        }
      }

      // --- 2. 価格改定リストをチェック ---
      let useRevision = false;
      let sourceData = product; // デフォルトは商品マスタ

      if (formEffectiveDate && revisionList.length > 0) {
          // 同じ商品コードで、フォームの有効日 *以前* の最新の改定を探す
          const applicableRevisions = revisionList
              .filter(r => String(r.code) === String(productCode))
              .filter(r => {
                  try {
                      const revisionDate = new Date(r.effectiveDate + 'T00:00:00');
                      // 価格改定リストの日付 <= フォームの登録有効日
                      return revisionDate <= formEffectiveDate;
                  } catch(e) { return false; }
              })
              // 日付が新しい順にソート
              .sort((a, b) => new Date(b.effectiveDate) - new Date(a.effectiveDate));
              
          if (applicableRevisions.length > 0) {
              // 適用すべき最新の改定データを採用
              sourceData = applicableRevisions[0];
              useRevision = true;
              console.log(`商品 ${productCode} は改定リスト (${sourceData.effectiveDate}) を参照しました。`);
          } else {
              console.log(`商品 ${productCode} は商品マスタを参照しました (改定日未達 or 改定なし)。`);
          }
      } else {
          // フォーム有効日未入力 or 改定リストなし の場合は商品マスタ
          sourceData = product;
          if (!formEffectiveDate) console.warn("登録有効日が未入力のため、商品マスタを参照します。");
      }

      // --- 3. 価格・率を計算・表示 ---
      let oroshi = 0;
      let jissai = 0;
      let genka = 0;
      const taxType = currentCustomerTaxType; // 顧客の課税方式

      // 課税方式に応じて価格を選択 (parseFloatで数値に変換、失敗時は0)
      if (taxType === '内税') {
          oroshi = parseFloat(sourceData.oroshi_tax_in) || 0; // 税込卸価格
          jissai = oroshi; // 販売価格の初期値は上代価格
          genka = parseFloat(sourceData.shiire_tax_in) || 0; // 税込仕入単価（原価）
      } else { // '外税' または不明の場合は税抜価格を使用
          oroshi = parseFloat(sourceData.oroshi) || 0; // 税抜卸価格
          jissai = oroshi; // 販売価格の初期値は上代価格
          genka = parseFloat(sourceData.shiire) || 0; // 仕入単価（原価）
      }

      // 計算結果を表示
      oroshiCell.textContent = oroshi;
      oroshiCell.dataset.genka = genka; // 原価をdata属性に保存
      if (jissaiInput) jissaiInput.value = jissai;

      updateRates(row);
  }

/**
   * 単価フォームのテーブル行を描画する関数。
   * [修正] 「実際価格」列を <td> から <input> に変更 (仕様③)
   */
  function renderPriceRowPair(price, index) {
      // Before行
      const beforeRow = `
          <tr class="price-before-row" data-index="${index}" data-state="existing" data-product-code="${price.productCode}">
              <td rowspan="2" style="text-align: center; vertical-align: middle; background-color: #f8f9fa;">
                  <button type="button" class="btn btn-sm" style="background-color: var(--danger-color); color: white; padding: 4px 8px;" onclick="deletePriceRowPair(${index})" title="削除">
                      <i class="fas fa-trash"></i>
                  </button>
              </td>
              <td rowspan="2" style="vertical-align: middle;">${price.productCode}</td>
              <td rowspan="2" style="vertical-align: middle;">${price.productName}</td>
              <td style="background-color: #fff9e6;" class="price-oroshi-before">${price.oroshi ? '¥' + Number(price.oroshi).toLocaleString() : '-'}</td>
              <td style="background-color: #fff9e6;">${price.jissai ? '¥' + Number(price.jissai).toLocaleString() : '-'}</td>
              <td style="background-color: #fff9e6;">${price.kakeritsu ? price.kakeritsu + '%' : '-'}</td>
              <td style="background-color: #fff9e6;">${price.arari ? price.arari + '%' : '-'}</td>
          </tr>
      `;

      // After行
      const afterRow = `
          <tr class="price-after-row" data-index="${index}" data-state="existing" data-product-code="${price.productCode}" data-genka="${price.genka || price.oroshi || 0}">
              <td class="price-oroshi-after">${price.oroshi ? '¥' + Number(price.oroshi).toLocaleString() : '-'}</td>
              <td>
                  <input type="number" class="form-control price-jissai-input" name="jissai_${index}" value="${price.jissai || ''}"
                      oninput="recalculatePriceRowPair(${index})" step="0.01" min="0" style="font-size: 0.9rem;">
              </td>
              <td class="price-kakeritsu-after">${price.kakeritsu ? price.kakeritsu + '%' : '-'}</td>
              <td class="price-arari-after">${price.arari ? price.arari + '%' : '-'}</td>
          </tr>
      `;

      // 備考欄行：現在登録されている備考１・備考２をテキストエリアの上に表示
      const currentBikoParts = [price.biko1, price.biko2].filter(v => v && v.trim());
      const currentBikoHtml = currentBikoParts.length > 0
        ? `<div style="font-size: 0.85rem; color: #555; margin-bottom: 6px; padding: 5px 8px; background: #eeeeee; border-radius: 3px; white-space: pre-wrap; word-break: break-all;">現在の内容：${currentBikoParts.join('　')}</div>`
        : '';
      const remarksRow = `
          <tr class="price-remarks-row" data-index="${index}">
              <td colspan="7" style="padding: 8px; background-color: #fafafa;">
                  ${currentBikoHtml}
                  <label style="font-size: 0.85rem; color: #666; margin-bottom: 4px; display: block;">備考:</label>
                  <textarea class="form-control" name="remarks_${index}" rows="2" placeholder="備考を入力（任意）" style="font-size: 0.9rem; resize: vertical;">${price.remarks || ''}</textarea>
              </td>
          </tr>
      `;

      return beforeRow + afterRow + remarksRow + `<tr class="price-row-spacer"><td colspan="7" style="height: 12px; padding: 0; background-color: #f5f5f5;"></td></tr>`;
  }

  function renderPriceFormRow(price, index, isNew = false) {
      const state = isNew ? 'new' : 'existing';

      // 既存行の商品コードは読み取り専用
      const codeReadonlyAttr = !isNew ? 'readonly' : '';
      // 新規行の商品コードは必須入力
      const codeRequiredAttr = isNew ? 'required' : '';

      // oninputイベントで updateRates を呼び出す
      const jissaiValue = price.jissai !== undefined ? price.jissai : '';
      const jissaiInputHtml = `
          <td>
              <input
                  type="number"
                  class="form-control jissai-price-input"
                  name="jissai"
                  value="${jissaiValue}"
                  step="0.01"
                  oninput="updateRates(this.closest('tr'))"
              >
          </td>
      `;

      // 未来の価格変更予定を確認
      const _normalizeCode = v => String(v || '').replace(/^'/, '').trim().replace(/^0+/, '') || '0';
      const _todayStr = new Date().toISOString().split('T')[0];
      const _cleanCode = _normalizeCode(price.productCode);
      const _futureRevision = revisionList
        .filter(r => _normalizeCode(r.code) === _cleanCode && r.effectiveDate > _todayStr)
        .sort((a, b) => a.effectiveDate.localeCompare(b.effectiveDate))[0];
      const _futureLabel = _futureRevision
        ? `<span style="color: #1565c0; font-size: 0.82rem; margin-left: 6px; font-weight: 500;">※${_futureRevision.effectiveDate} 価格変更対象商品</span>`
        : '';

      // テーブル行のHTMLを生成
      return `
          <tr data-index="${index}" data-state="${state}">
              <td><input type="text" class="form-control product-code" name="productCode" value="${price.productCode || ''}" onblur="calculatePriceRow(this)" ${codeReadonlyAttr} ${codeRequiredAttr}></td>
              <td class="product-name">${price.productName || ''}${_futureLabel}</td>
              <td class="oroshi-price">${price.oroshi !== undefined ? price.oroshi : ''}</td>
              ${jissaiInputHtml}
              <td class="kakeritsu">${price.kakeritsu !== undefined ? price.kakeritsu : ''}</td>
              <td class="arariritsu">${price.arari !== undefined ? price.arari : ''}</td>
          </tr>
      `;
  }
  
   /**
   * 単価フォームに行を追加する関数。修正後の renderPriceFormRow を呼び出すように修正。
   */
  function addPriceFormRow() {
      const tbody = document.getElementById('price-form-tbody');
      // 新しい行のインデックス (既存行数と同じ値になる)
      const newIndex = tbody.querySelectorAll('tr').length;

      // 新しい空の price オブジェクトを作成 (renderPriceFormRow が期待する形式)
      const newPriceData = {
          productCode: '',
          productName: '',
          oroshi: '',
          jissai: '',
          kakeritsu: '',
          arari: ''
      };

      // ★ 修正: 修正済みの renderPriceFormRow を呼び出して新しい行のHTMLを生成 (isNew = true)
      const newRowHtml = renderPriceFormRow(newPriceData, newIndex, true);

      // tbody の末尾に行を追加
      tbody.insertAdjacentHTML('beforeend', newRowHtml);
  }
  /**
 * 単価フォームの指定された行(row)の 卸価格 と 実際価格 から、
 * 掛率と粗利率を再計算してセルに表示します。
 */
function updateRates(row) {
    if (!row) return;

    try {
        // 卸価格は <td> のテキストから取得
        const oroshiCell = row.querySelector('.oroshi-price');
        const oroshi = parseFloat(oroshiCell.textContent) || 0;

        // 原価はdata属性から取得
        const genka = parseFloat(oroshiCell.dataset.genka) || oroshi; // data-genkaがない場合は上代価格をフォールバック

        // 実際価格は <input> の値から取得
        const jissaiInput = row.querySelector('.jissai-price-input');
        const jissai = parseFloat(jissaiInput.value) || 0;

        // 掛率・粗利率セルを取得
        const kakeritsuCell = row.querySelector('.kakeritsu');
        const arariCell = row.querySelector('.arariritsu');

        // 掛率と粗利率計算 (%なし、小数点1位まで)
        let kakeritsu = '';
        if (oroshi > 0) { // 0除算を防ぐ
            // 掛率 = (実際価格 / 卸価格) * 100
            kakeritsu = ((jissai / oroshi) * 100).toFixed(1);
        }
        let arari = '';
        if (jissai > 0 && genka > 0) { // 0除算を防ぐ
            // 粗利率 = ((実際価格 - 原価) / 実際価格) * 100
            arari = (((jissai - genka) / jissai) * 100).toFixed(1);
        }

        // 計算結果を表示 (%記号は付けない)
        kakeritsuCell.textContent = kakeritsu;
        arariCell.textContent = arari;

    } catch (e) {
        console.error("Rate calculation failed:", e, row);
        // エラー時はいったんクリア
        const kakeritsuCell = row.querySelector('.kakeritsu');
        const arariCell = row.querySelector('.arariritsu');
        if (kakeritsuCell) kakeritsuCell.textContent = '';
        if (arariCell) arariCell.textContent = '';
    }
}
/**
   * 商品登録修正フォームを描画。
   * [修正] 登録有効日(effectiveDate)の input に onchange イベントを追加。
   * [修正] フォーム描画後に updateRates も実行するよう変更。
   */
  function renderPriceForm(customerId, customerName, currentPrices) {
      const page = document.getElementById('price-form-page');

      // ★修正: ログインユーザー情報を取得して申請者情報に自動入力
      const applicantName = currentUser?.name || '';
      const applicantEmail = currentUser?.email || '';

      // 顧客情報を取得（キャッシュまたは空データ）
      const customerDetail = customerDetailCache[customerId] || {};
      const basicInfo = customerDetail.basicInfo || {};

      // 顧客情報ボックスを生成
      const customerInfoBoxHtml = `
          <div style="background-color: #f5f5f5; padding: 16px; border-radius: 8px; margin-bottom: 20px;">
              <h3 style="margin-top: 0; margin-bottom: 12px;">顧客情報</h3>
              <div class="info-grid">
                  <div class="info-item"><span class="label">得意先名</span><div class="value">${basicInfo['得意先名称'] || customerName || '-'}</div></div>
                  <div class="info-item"><span class="label">ランク</span><div class="value">${basicInfo['得意先ランク区分名称'] || '-'}</div></div>
                  <div class="info-item"><span class="label">得意先グループコード</span><div class="value">${basicInfo['得意先グループコード'] || '-'}</div></div>
                  <div class="info-item"><span class="label">業態</span><div class="value">${basicInfo['業態'] || '-'}</div></div>
                  <div class="info-item"><span class="label">担当部署</span><div class="value">${basicInfo['部門名_社員マスタ'] || '-'}</div></div>
                  <div class="info-item"><span class="label">担当者</span><div class="value">${basicInfo['営業担当者名称'] || '-'}</div></div>
                  <div class="info-item"><span class="label">登録日</span><div class="value">${basicInfo['登録日'] ? new Date(basicInfo['登録日']).toLocaleDateString('ja-JP') : '-'}</div></div>
                  <div class="info-item"><span class="label">最終更新日</span><div class="value">${basicInfo['最終更新日'] ? new Date(basicInfo['最終更新日']).toLocaleDateString('ja-JP') : '-'}</div></div>
              </div>
          </div>
      `;

      // 価格改定リストから今日以降の日付を取得して選択肢を生成
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const futureDates = revisionList
          .map(r => r.effectiveDate)
          .filter(date => {
              try {
                  const revDate = new Date(date + 'T00:00:00');
                  return revDate >= today;
              } catch(e) { return false; }
          })
          .filter((date, index, self) => self.indexOf(date) === index) // 重複削除
          .sort((a, b) => new Date(a) - new Date(b)); // 昇順ソート

      let priceOptionsHtml = '<option value="current">現行の価格（商品マスタ）</option>';
      futureDates.forEach(date => {
          const formattedDate = date.replace(/-/g, '/');
          priceOptionsHtml += `<option value="${date}">${formattedDate}変更予定</option>`;
      });

  function deletePriceRowPair(index) {
      const beforeRow = document.querySelector(`.price-before-row[data-index="${index}"]`);
      const afterRow = document.querySelector(`.price-after-row[data-index="${index}"]`);
      const remarksRow = document.querySelector(`.price-remarks-row[data-index="${index}"]`);
      const spacerRow = remarksRow?.nextElementSibling;

      if (!beforeRow || !afterRow) return;

      const state = beforeRow.dataset.state;

      if (state === 'new') {
          // 新規商品は完全削除
          beforeRow.remove();
          afterRow.remove();
          if (remarksRow) remarksRow.remove();
          if (spacerRow?.classList.contains('price-row-spacer')) {
              spacerRow.remove();
          }
      } else {
          // 既存商品は削除マーク
          if (state === 'deleted') {
              beforeRow.dataset.state = 'existing';
              afterRow.dataset.state = 'existing';
              beforeRow.style.opacity = '1';
              afterRow.style.opacity = '1';
              beforeRow.style.textDecoration = '';
              afterRow.style.textDecoration = '';
              if (remarksRow) {
                  remarksRow.style.opacity = '1';
                  remarksRow.style.textDecoration = '';
              }
          } else {
              beforeRow.dataset.state = 'deleted';
              afterRow.dataset.state = 'deleted';
              beforeRow.style.opacity = '0.5';
              afterRow.style.opacity = '0.5';
              beforeRow.style.textDecoration = 'line-through';
              afterRow.style.textDecoration = 'line-through';
              if (remarksRow) {
                  remarksRow.style.opacity = '0.5';
                  remarksRow.style.textDecoration = 'line-through';
              }
          }
      }
  }

  function recalculatePriceRowPair(index) {
      const beforeRow = document.querySelector(`.price-before-row[data-index="${index}"]`);
      const afterRow = document.querySelector(`.price-after-row[data-index="${index}"]`);
      if (!beforeRow || !afterRow) return;

      const productCode = String(beforeRow.dataset.productCode || '').replace(/^'/, '').trim();
      const jissaiInput = afterRow.querySelector('.price-jissai-input');
      const jissai = parseFloat(jissaiInput.value) || 0;

      // 商品マスタから卸価格と原価を取得
      const targetPriceSelect = document.getElementById('targetPrice');
      const targetPriceValue = targetPriceSelect ? targetPriceSelect.value : 'current';
      let oroshi = 0;
      let genka = 0;

      // 対象価格に基づく価格計算
      const product = productMaster.find(p => String(p.code) === String(productCode));
      if (product) {
          let effectiveDate = null;
          if (targetPriceValue && targetPriceValue !== 'current') {
              effectiveDate = new Date(targetPriceValue + 'T00:00:00');
          }

          if (effectiveDate && revisionList.length > 0) {
              const revisions = revisionList.filter(r => String(r.code) === String(productCode) && r.effectiveDate <= targetPriceValue);
              if (revisions.length > 0) {
                  revisions.sort((a, b) => new Date(b.effectiveDate) - new Date(a.effectiveDate));
                  const latest = revisions[0];
                  oroshi = currentCustomerTaxType === '内税' ? (parseFloat(latest.oroshi_tax_in) || 0) : (parseFloat(latest.oroshi) || 0);
                  genka = currentCustomerTaxType === '内税' ? (parseFloat(latest.shiire_tax_in) || 0) : (parseFloat(latest.shiire) || 0);
              }
          }

          if (oroshi === 0) {
              oroshi = currentCustomerTaxType === '内税' ? (parseFloat(product.oroshi_tax_in) || 0) : (parseFloat(product.oroshi) || 0);
          }
          if (genka === 0) {
              genka = currentCustomerTaxType === '内税' ? (parseFloat(product.shiire_tax_in) || 0) : (parseFloat(product.shiire) || 0);
          }
      }

      // data-genka 属性を更新
      afterRow.dataset.genka = genka;

      // 掛率・粗利率を計算
      const kakeritsu = (oroshi > 0 && jissai > 0) ? ((jissai / oroshi) * 100).toFixed(1) : '';
      const arari = (genka > 0 && jissai > 0) ? (((jissai - genka) / jissai) * 100).toFixed(1) : '';

      // 表示を更新
      afterRow.querySelector('.price-oroshi-after').textContent = oroshi > 0 ? `¥${oroshi.toLocaleString()}` : '-';
      afterRow.querySelector('.price-kakeritsu-after').textContent = kakeritsu ? `${kakeritsu}%` : '-';
      afterRow.querySelector('.price-arari-after').textContent = arari ? `${arari}%` : '-';
  }

  function recalculateAllPriceItemsTable() {
      const existingRows = document.querySelectorAll('.price-before-row[data-state="existing"], .price-before-row[data-state="deleted"]');
      existingRows.forEach(row => {
          const index = row.dataset.index;
          recalculatePriceRowPair(index);
      });
      const newRows = document.querySelectorAll('.price-before-row[data-state="new"]');
      newRows.forEach(row => {
          const index = row.dataset.index;
          recalculateNewPriceRow(index);
      });
  }

  // 商品コード入力ヘルパー: "コード - 商品名" 形式からコードを抽出
  function parseProductCode(value) {
      if (!value) return '';
      const trimmed = value.trim();
      return trimmed.includes(' - ') ? trimmed.split(' - ')[0].trim() : trimmed;
  }

  // カスタムオートコンプリートドロップダウンを更新（Safari/Mac含む全ブラウザ対応）
  function updateProductDatalist(datalistId, query) {
      const dropdown = document.getElementById(datalistId);
      if (!dropdown || !productMaster || !productMaster.length) return;

      const q = String(query || '').toLowerCase().trim();
      if (!q) { dropdown.style.display = 'none'; return; }

      const matches = productMaster
          .filter(p => !p.name?.startsWith('Ｏ＿'))
          .filter(p => String(p.code).toLowerCase().includes(q) || (p.name && p.name.toLowerCase().includes(q)))
          .slice(0, 30);

      if (!matches.length) { dropdown.style.display = 'none'; return; }

      dropdown.innerHTML = matches.map(p => {
          const val = p.code + ' - ' + p.name;
          const escaped = val.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
          return `<div class="ac-option" data-value="${escaped}" onmousedown="selectProductOption('${datalistId}', this)">${val}</div>`;
      }).join('');

      // inputの直下に表示（absolute配置のため親要素にposition:relativeが必要）
      const input = document.querySelector(`[data-dropdown-id="${datalistId}"]`);
      if (input) {
          const parent = input.parentElement;
          if (getComputedStyle(parent).position === 'static') {
              parent.style.position = 'relative';
          }
          dropdown.style.top = (input.offsetTop + input.offsetHeight) + 'px';
          dropdown.style.left = input.offsetLeft + 'px';
          dropdown.style.width = input.offsetWidth + 'px';
      }
      dropdown.style.display = 'block';
  }

  function selectProductOption(datalistId, optionEl) {
      const dropdown = document.getElementById(datalistId);
      if (dropdown) dropdown.style.display = 'none';
      const input = document.querySelector(`[data-dropdown-id="${datalistId}"]`);
      if (!input) return;
      input.value = optionEl.dataset.value;
      // oninput相当の処理を手動発火
      input.dispatchEvent(new Event('input', { bubbles: true }));
  }

  function scheduleCloseProductDropdown(datalistId) {
      // onmousedownが先に発火するようにわずかに遅延して閉じる
      setTimeout(() => {

      if (!q) { dropdown.style.display = 'none'; return; }

          .filter(c => !c.isHidden)
          .filter(c => c.name && c.name.toLowerCase().includes(q))

      dropdown.innerHTML = matches.map(c => {

          return `<div class="ac-option" onmousedown="selectCustomerOption('${dropdownId}', '${escaped}')">${c.name}</div>`;
      }).join('');

      const input = document.querySelector(`[data-dropdown-id="${dropdownId}"]`);
      if (input) {
          const parent = input.parentElement;
          if (getComputedStyle(parent).position === 'static') parent.style.position = 'relative';
          dropdown.style.top = (input.offsetTop + input.offsetHeight) + 'px';
          dropdown.style.left = input.offsetLeft + 'px';
          dropdown.style.width = input.offsetWidth + 'px';

  function selectCustomerOption(dropdownId, name) {
      const dropdown = document.getElementById(dropdownId);
      if (dropdown) dropdown.style.display = 'none';
      const input = document.querySelector(`[data-dropdown-id="${dropdownId}"]`);

      input.value = name;

  // 新規顧客登録フォームの商品コード入力イベント (テーブル形式)
  // 商品コード入力でEnterキーを押した時にドロップダウンの先頭を選択する（Mac IME対応）
  function onProductCodeKeydown(event, inputElement) {
      if (event.key !== 'Enter') return;
      if (event.isComposing) return; // IME確定中は無視
      event.preventDefault();
      const datalistId = inputElement.dataset.dropdownId;
      const dropdown = datalistId ? document.getElementById(datalistId) : null;
      if (dropdown && dropdown.style.display !== 'none' && dropdown.children.length > 0) {
          // ドロップダウンが開いていれば先頭アイテムをmousedownで選択
          dropdown.children[0].dispatchEvent(new MouseEvent('mousedown', { bubbles: true }));
      } else {
          // ドロップダウンがなければinputを再発火してlookupを強制実行
          inputElement.dispatchEvent(new Event('input', { bubbles: true }));
      }
  }

  function onProductCodeInput_nc(inputElement) {
      const datalistId = inputElement.dataset.dropdownId || inputElement.getAttribute('list');
      if (datalistId) updateProductDatalist(datalistId, inputElement.value);
      if (inputElement.value.includes(' - ')) {

  function lookupNewProductRow(index) {

      if (!beforeRow) return;

      const productCodeInput = beforeRow.querySelector(`input[name="productCode_${index}"]`);

              if (kakeAfter) kakeAfter.textContent = '-';

  function recalculateNewPriceRow(index) {
      const beforeRow = document.querySelector(`.price-before-row[data-index="${index}"]`);
      const afterRow = document.querySelector(`.price-after-row[data-index="${index}"]`);
      if (!beforeRow || !afterRow) return;

      const productCodeInput = beforeRow.querySelector(`input[name="productCode_${index}"]`);
      const productCode = productCodeInput.value.trim();
      const jissaiInput = afterRow.querySelector('.price-jissai-input');
      const jissai = parseFloat(jissaiInput.value) || 0;

      if (!productCode) return;

      const product = productMaster.find(p => String(p.code) === String(productCode) && !p.name?.startsWith('Ｏ＿'));
      if (!product) return;

      if (jissaiInput) jissaiInput.disabled = false;

      // 上代価格ドロップダウン (targetPrice) または 登録有効日に基づく卸価格計算
      const _targetPriceSelect = document.getElementById('targetPrice');
      const _targetPriceValue = _targetPriceSelect ? _targetPriceSelect.value : null;
      const effectiveDateStr = (_targetPriceValue && _targetPriceValue !== 'current')
          ? _targetPriceValue
          : (document.getElementById('effectiveDate')?.value || '');
      let oroshi = 0;

      if (effectiveDateStr && revisionList.length > 0) {
          const revisions = revisionList.filter(r => String(r.code) === String(productCode) && r.effectiveDate <= effectiveDateStr);
          if (revisions.length > 0) {
              revisions.sort((a, b) => new Date(b.effectiveDate) - new Date(a.effectiveDate));
              const latest = revisions[0];
              oroshi = currentCustomerTaxType === '内税' ? (parseFloat(latest.oroshi_tax_in) || 0) : (parseFloat(latest.oroshi) || 0);
          }
      }

      if (oroshi === 0) {
          oroshi = currentCustomerTaxType === '内税' ? (parseFloat(product.oroshi_tax_in) || 0) : (parseFloat(product.oroshi) || 0);
      }

      // 原価（商品マスタの仕入単価）を取得
      const genka = currentCustomerTaxType === '内税' ? (parseFloat(product.shiire_tax_in) || 0) : (parseFloat(product.shiire) || 0);

      // 掛率・粗利率を計算
      const kakeritsu = (oroshi > 0 && jissai > 0) ? ((jissai / oroshi) * 100).toFixed(1) : '';
      const arari = (jissai > 0) ? (((jissai - genka) / jissai) * 100).toFixed(1) : '';

  function recalculatePriceItem(index) {
      const card = document.querySelector(`.price-item-card[data-index="${index}"]`);
      if (!card) return;

      const productCode = card.dataset.productCode;
      const jissaiInput = card.querySelector('.price-jissai-input');
      const jissai = parseFloat(jissaiInput.value) || 0;

      // 商品マスタから卸価格を取得
      const effectiveDateStr = document.getElementById('effectiveDate')?.value || '';
      let oroshi = 0;

      // 登録有効日に基づく価格計算
      const product = productMaster.find(p => String(p.code) === String(productCode) && !p.name?.startsWith('Ｏ＿'));
      if (product) {
          // 価格改定リストをチェック
          let effectiveDate = null;
          if (effectiveDateStr) {
              effectiveDate = new Date(effectiveDateStr + 'T00:00:00');
          }

          if (effectiveDate && revisionList.length > 0) {
              const revisions = revisionList.filter(r => String(r.code) === String(productCode) && r.effectiveDate <= effectiveDateStr);
              if (revisions.length > 0) {
                  revisions.sort((a, b) => new Date(b.effectiveDate) - new Date(a.effectiveDate));
                  const latest = revisions[0];
                  oroshi = currentCustomerTaxType === '内税' ? (parseFloat(latest.oroshi_tax_in) || 0) : (parseFloat(latest.oroshi) || 0);
              }
          }

          if (oroshi === 0) {
              oroshi = currentCustomerTaxType === '内税' ? (parseFloat(product.oroshi_tax_in) || 0) : (parseFloat(product.oroshi) || 0);
          }

          // 原価（商品マスタの仕入単価）を取得
          const genka = currentCustomerTaxType === '内税' ? (parseFloat(product.shiire_tax_in) || 0) : (parseFloat(product.shiire) || 0);

          // 掛率・粗利率を計算
          const kakeritsu = (oroshi > 0 && jissai > 0) ? ((jissai / oroshi) * 100).toFixed(1) : '';
          const arari = (jissai > 0) ? (((jissai - genka) / jissai) * 100).toFixed(1) : '';

          // 表示を更新
          card.querySelector('.price-oroshi-display').textContent = oroshi > 0 ? `¥${oroshi.toLocaleString()}` : '-';
          card.querySelector('.price-kakeritsu-display').textContent = kakeritsu ? `${kakeritsu}%` : '-';
          card.querySelector('.price-arari-display').textContent = arari ? `${arari}%` : '-';
      }
  }

/**
   * 商品登録修正フォーム送信時の処理を改修。
   * [修正] 実際価格(jissai)の取得元を .jissai-price (td) から .jissai-price-input (input) に変更 (仕様③)
   */
  function handlePriceFormSubmit(event, customerId, customerName) {
      event.preventDefault(); // デフォルトのフォーム送信をキャンセル
      const form = event.target; // 送信されたフォーム要素
      const tbody = document.getElementById('price-form-tbody');
      const rows = tbody.querySelectorAll('tr'); // テーブルの全行を取得

      // --- 申請者情報、有効日を取得 ---
      const applicantName = form.querySelector('#applicantNamePrice').value.trim();
      const applicantEmail = form.querySelector('#applicantEmailPrice').value.trim();
      const effectiveDate = form.querySelector('#effectiveDate').value;

        // --- 必須項目の簡易バリデーション ---
        if (!effectiveDate) {
            alert('登録有効日を入力してください。');
            form.querySelector('#effectiveDate').focus(); // 有効日入力欄にフォーカス
            return; // 処理中断
        }
        // 必要に応じて申請者名・メールのバリデーションも追加

      // --- 変更内容 (added, modified, deleted) を格納する配列 ---
      const added = [];
      const modified = [];
      const deleted = [];
      let hasInvalidProduct = false; // 商品不明フラグ

      // --- テーブルの各行を処理 ---
      rows.forEach((row, rowIndex) => {
          const state = row.dataset.state; // 'new', 'existing', 'deleted'
          const index = parseInt(row.dataset.index); // originalPrices のインデックス (既存行・削除行用)

          // --- 各列からデータを取得 ---
          const productCodeInput = row.querySelector('[name="productCode"]');
          const productCode = productCodeInput.value.trim();
          // 商品名は自動表示されたテキストを取得
          const productName = row.querySelector('.product-name').textContent.trim();
          // 裁断・袋詰は選択された value (コード) を取得
          const saitanCode = row.querySelector('[name="saitanCode"]').value;
          const fukuroCode = row.querySelector('[name="fukuroCode"]').value;
          // 卸価格・率は自動表示されたテキストを取得
          const oroshi = row.querySelector('.oroshi-price').textContent.trim();
          const kakeritsu = row.querySelector('.kakeritsu').textContent.trim(); // %なしの値
          const arari = row.querySelector('.arariritsu').textContent.trim();   // %なしの値
          
          const jissai = row.querySelector('.jissai-price-input').value.trim();

          // --- バリデーション: 新規行で商品不明 or コード空欄はスキップ ---
          if (state === 'new' && productName === '商品不明') {
              console.warn(`Skipping row ${rowIndex + 1}: 商品コードが見つかりません。`);
              hasInvalidProduct = true; // 不明な商品があったことを記録
              return; // 次の行へ (continue)
          }
          if (state === 'new' && !productCode) {
              console.warn(`Skipping row ${rowIndex + 1}: 商品コードが空です。`);
              return; // 次の行へ
          }
          if (state === 'new' && !jissai) {
              console.warn(`Skipping row ${rowIndex + 1}: 商品コード ${productCode} の実際価格が空です。`);
              // (必要ならここでアラート)
              return; // 次の行へ
          }

          // --- GASに渡すためのデータオブジェクトを作成 ---
          const currentData = {
              productCode: productCode,
              productName: productName,
              saitanCode: saitanCode,
              fukuroCode: fukuroCode,
              oroshi: oroshi,
              jissai: jissai, // <input> から取得した値
              kakeritsu: kakeritsu,
              arari: arari
          };

          // --- 行の状態に応じて配列に格納 ---
          if (state === 'new') {
              added.push(currentData);
          } else if (state === 'deleted') {
              // 削除時は元のデータを取得して格納 (originalPrices[index] が存在するか確認)
              if (originalPrices && originalPrices[index]) {
                  deleted.push(originalPrices[index]);
              } else {
                  console.warn(`Original price data not found for deleted row index ${index}`);
              }
          } else if (state === 'existing') {
              // 既存行の場合、元のデータと比較して変更があれば modified に格納
              const originalData = (originalPrices && originalPrices[index]) ? originalPrices[index] : null;
              if (originalData) {
                  // 変更があったか比較 (裁断・袋詰・★実際価格★ を比較)
                  if (String(originalData.saitanCode) !== String(currentData.saitanCode) ||
                      String(originalData.fukuroCode) !== String(currentData.fukuroCode) ||
                      String(originalData.jissai) !== String(currentData.jissai)
                     )
                  {
                      // modified 配列には元データ (originalData) と新しいデータ (newData) を格納
                      modified.push({ originalData: originalData, newData: currentData });
                  }
                  // 変更がなければ何もしない (modified には追加されない)
              } else {
                  console.warn(`Original price data not found for existing row index ${index}`);
              }
          }
      });

      // --- 最終チェック ---
      if (hasInvalidProduct) {
          alert('商品コードが見つからない行があります（商品名が「商品不明」）。\n該当行を削除するか、正しい商品コードを入力してください。');
          return; // 処理中断
      }

      if (added.length === 0 && modified.length === 0 && deleted.length === 0) {
          alert('変更点がありません。申請する内容を入力または変更してください。');
          return; // 処理中断
      }

      // --- 確認画面用のデータ (pendingApplicationData) を作成 ---
      pendingApplicationData = {
          type: 'priceInfo', // 申請タイプ
          customerId: customerId,
          customerName: customerName,
          applicantName: applicantName,   // 申請者名
          applicantEmail: applicantEmail, // 申請者メール
          effectiveDate: effectiveDate,   // 登録有効日
          payload: { added, modified, deleted } // 変更内容
      };

      // --- 確認画面を表示 ---
      renderPriceConfirmPage(); // 確認画面描画関数を呼び出す
      showPage('price-confirm-page'); // 確認画面ページを表示
  }
 /**

      const deleted = [];

      // --- 既存商品の処理 ---
      const existingCards = document.querySelectorAll('.price-item-card[data-state="existing"], .price-item-card[data-state="deleted"]');
      existingCards.forEach(card => {
          const index = parseInt(card.dataset.index);
          const state = card.dataset.state;
          const productCode = card.dataset.productCode;

          if (state === 'deleted') {
              // 削除
              if (originalPrices && originalPrices[index]) {
                  deleted.push(originalPrices[index]);
              }
          } else {
              // 既存商品の現在の値を取得
              const saitanCode = card.querySelector(`select[name="saitanCode_${index}"]`).value;
              const fukuroCode = card.querySelector(`select[name="fukuroCode_${index}"]`).value;
              const jissai = card.querySelector(`.price-jissai-input[name="jissai_${index}"]`).value;
              const oroshi = card.querySelector('.price-oroshi-display').textContent.replace('¥', '').replace(/,/g, '').trim();
              const kakeritsu = card.querySelector('.price-kakeritsu-display').textContent.replace('%', '').trim();
              const arari = card.querySelector('.price-arari-display').textContent.replace('%', '').trim();

              const product = productMaster.find(p => String(p.code) === String(productCode));
              const productName = product ? product.name : '';

              const currentData = {
                  productCode: productCode,
                  productName: productName,
                  saitanCode: saitanCode,
                  fukuroCode: fukuroCode,
                  oroshi: oroshi,
                  jissai: jissai,
                  kakeritsu: kakeritsu,
                  arari: arari
              };

              // 元のデータと比較
              const originalData = originalPrices[index];
              if (originalData) {
                  if (String(originalData.saitanCode) !== String(currentData.saitanCode) ||
                      String(originalData.fukuroCode) !== String(currentData.fukuroCode) ||
                      String(originalData.jissai) !== String(currentData.jissai)) {
                      modified.push({ originalData: originalData, newData: currentData });
                  }
              }
          }
      });

      // --- 新規商品の処理 ---
      const newCards = document.querySelectorAll('.price-item-card[data-state="new"]');
      newCards.forEach(card => {
          const index = card.dataset.index;
          const productCodeInput = card.querySelector(`input[name="productCode_${index}"]`);
          const productCode = productCodeInput.value.trim();

          if (!productCode) return; // 空欄はスキップ

          const product = productMaster.find(p => String(p.code) === String(productCode));
          if (!product) {
              alert(`商品コード ${productCode} が見つかりません。`);
              return;
          }

          const saitanCode = card.querySelector(`select[name="saitanCode_${index}"]`).value;
          const fukuroCode = card.querySelector(`select[name="fukuroCode_${index}"]`).value;
          const jissaiInput = card.querySelector(`.price-jissai-input[name="jissai_${index}"]`);
          const jissai = jissaiInput.value.trim();

          if (!jissai) {
              alert(`商品コード ${productCode} の実際価格を入力してください。`);
              jissaiInput.focus();
              return;
          }

          const oroshi = card.querySelector('.price-oroshi-display').textContent.replace('¥', '').replace(/,/g, '').trim();
          const kakeritsu = card.querySelector('.price-kakeritsu-display').textContent.replace('%', '').trim();
          const arari = card.querySelector('.price-arari-display').textContent.replace('%', '').trim();

          added.push({
              productCode: productCode,
              productName: product.name,
              saitanCode: saitanCode,
              fukuroCode: fukuroCode,
              oroshi: oroshi,
              jissai: jissai,
              kakeritsu: kakeritsu,
              arari: arari
          });
      });

      // 最終チェック
      if (added.length === 0 && modified.length === 0 && deleted.length === 0) {
          alert('変更点がありません。申請する内容を入力または変更してください。');
          return;
      }

      // 確認画面用データを作成
      pendingApplicationData = {
          type: 'priceInfo',
          customerId: customerId,
          customerName: customerName,
          applicantName: applicantName,
          applicantEmail: applicantEmail,
          targetPrice: targetPrice,
          payload: { added, modified, deleted }
      };

      // 確認画面を表示
      renderPriceConfirmPage();
      showPage('price-confirm-page');
  }

  /**
   * 訪問頻度文字列を年間訪問回数に変換します
   * @param {string} frequencyStr - 訪問頻度文字列（例: "6回/年", "2ヶ月に1回"）
   * @return {number|null} 年間訪問回数、解析できない場合はnull
   */
  function parseVisitFrequency(frequencyStr) {
    if (!frequencyStr || typeof frequencyStr !== 'string') return null;

    const str = frequencyStr.trim();
    if (!str) return null;

    // 「○回/年」形式（例: "6回/年", "4回/年　以上"）
    const yearMatch = str.match(/(\d+)\s*回\s*[\/／]\s*年/);
    if (yearMatch) {
      return parseInt(yearMatch[1], 10);
    }

    // 「○ヶ月に1回」形式（例: "2ヶ月に1回", "3ヶ月に1回"）
    const monthMatch = str.match(/(\d+)\s*[ヶケか]*月\s*に\s*1\s*回/);
    if (monthMatch) {
      const months = parseInt(monthMatch[1], 10);
      return Math.ceil(12 / months); // 12ヶ月÷○ヶ月 = 年間回数
    }

    // 「毎月○回」形式（例: "毎月1回"）
    const monthlyMatch = str.match(/毎月\s*(\d+)\s*回/);
    if (monthlyMatch) {
      return parseInt(monthlyMatch[1], 10) * 12;
    }

    return null;
  }

  // 顧客名変更時にランクと定期訪問未達状況を更新
  async function updateCustomerRankAndVisitStatus() {
    const customerName = document.getElementById('schedule-customer-name').value;
    const customer = allCustomers.find(c => c.name === customerName);
    const rankInput = document.getElementById('schedule-rank');
    const visitStatusContainer = document.getElementById('visit-status-container');
    const visitStatusContent = document.getElementById('visit-status-content');

    console.log('[updateCustomerRankAndVisitStatus] 開始:', customerName);

    if (!customer) {
      console.log('[updateCustomerRankAndVisitStatus] 顧客が見つかりません');
      rankInput.value = '';
      visitStatusContainer.style.display = 'none';
      return;
    }

    // ランクを設定
    const customerRank = customer.rank || customer['得意先ランク区分名称'] || '-';
    rankInput.value = customerRank;
    console.log('[updateCustomerRankAndVisitStatus] 顧客ランク:', customerRank);

    // allRanksまたはallMeetingsが未読み込みの場合は表示しない
    if (!allRanks || allRanks.length === 0 || !allMeetings || allMeetings.length === 0) {
      console.log('[updateCustomerRankAndVisitStatus] データ未読み込み - allRanks:', allRanks?.length, 'allMeetings:', allMeetings?.length);
      visitStatusContainer.style.display = 'none';
      return;
    }

    // 定期訪問未達を判定
    // ランク別の訪問頻度を取得（MasterData.jsで r.name に統一済み）
    console.log('[updateCustomerRankAndVisitStatus] allRanks[0]:', allRanks[0]);
    const rankData = allRanks.find(r =>
      String(r.name || '').trim() === String(customerRank).trim()
    );
    console.log('[updateCustomerRankAndVisitStatus] rankData:', rankData);

    if (!rankData) {
      console.log('[updateCustomerRankAndVisitStatus] ランクデータが見つかりません');
      visitStatusContainer.style.display = 'none';
      return;
    }

    // 訪問頻度を解析
    const visitFrequency = rankData['訪問頻度'] || '';
    console.log('[updateCustomerRankAndVisitStatus] 訪問頻度:', visitFrequency);

    const yearlyRequiredCount = parseVisitFrequency(visitFrequency);
    console.log('[updateCustomerRankAndVisitStatus] 年間基準回数:', yearlyRequiredCount);

    if (yearlyRequiredCount === null || yearlyRequiredCount === 0) {
      console.log('[updateCustomerRankAndVisitStatus] 訪問頻度基準なし');
      // 訪問頻度基準なしの場合は表示
      visitStatusContent.innerHTML = `
        <div style="background-color: #757575; color: white; padding: 12px; border-radius: 4px; font-weight: bold; text-align: center;">
          訪問頻度基準なし
        </div>
      `;
      visitStatusContainer.style.display = 'block';
      return;
    }

    // 過去1年間の訪問回数を計算
    const oneYearAgo = new Date();
    oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);

    const customerMeetings = allMeetings.filter(m => m.customerName === customerName);
    console.log('[updateCustomerRankAndVisitStatus] この顧客の全商談:', customerMeetings.length);

    const visitCount = allMeetings.filter(m => {
      if (m.customerName !== customerName) return false;
      if (!m.result) return false; // 実績のあるもののみ
      try {
        const meetingDate = new Date(m.actualDate || m.date);
        return meetingDate >= oneYearAgo;
      } catch (e) {
        return false;
      }
    }).length;
    console.log('[updateCustomerRankAndVisitStatus] 過去1年の訪問回数:', visitCount);
    console.log('[updateCustomerRankAndVisitStatus] 年間基準回数:', yearlyRequiredCount);

    // 未達判定
    const isUnderAchieved = visitCount < yearlyRequiredCount;
    console.log('[updateCustomerRankAndVisitStatus] 未達判定:', isUnderAchieved);

    if (isUnderAchieved) {
      // 未達の場合は赤背景で警告表示
      console.log('[updateCustomerRankAndVisitStatus] 定期訪問未達を表示します');
      visitStatusContent.innerHTML = `
        <div style="background-color: #d32f2f; color: white; padding: 12px; border-radius: 4px; font-weight: bold; text-align: center; margin-bottom: 8px;">
          定期訪問未達
        </div>
        <table class="main-table" style="margin: 0;">
          <thead>
            <tr>
              <th>ランク</th>
              <th>担当者</th>
              <th>過去1年間の訪問回数</th>
              <th>基準</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>${customerRank}</td>
              <td>${customer.handlerName || customer['営業担当者名称'] || '-'}</td>
              <td>${visitCount}回</td>
              <td>${yearlyRequiredCount}回/年以上</td>
            </tr>
          </tbody>
        </table>
      `;
      visitStatusContainer.style.display = 'block';
    } else {
      console.log('[updateCustomerRankAndVisitStatus] 訪問基準を達成しているため表示しない');
      visitStatusContainer.style.display = 'none';
    }

    // 直近の訪問情報を表示
    renderRecentVisitInfo(customerName, 'recent-visit-container');
  }
  
  /**
   * 顧客選択時に直近の訪問日時と商談情報テーブルを指定コンテナに表示します
   */
  function renderRecentVisitInfo(customerName, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;

    if (!customerName || !allMeetings || allMeetings.length === 0) {
      container.style.display = 'none';
      return;
    }

    const todayStr = new Date().toISOString().split('T')[0];
    const customerMeetings = allMeetings.filter(m => m.customerName === customerName);

    // 直近の実績日（最新のactualDate）
    const withResult = customerMeetings.filter(m => m.actualDate).sort((a, b) => b.actualDate.localeCompare(a.actualDate));
    const lastVisitDate = withResult.length > 0 ? withResult[0].actualDate : null;

    // 最後に実績登録されている商談（直近1件）
    const lastMeeting = withResult.length > 0 ? withResult[0] : null;

    // 未来の商談予定（scheduleDate > today、実績なし）
    const futureMeetings = customerMeetings
      .filter(m => m.scheduleDate && m.scheduleDate > todayStr && !m.actualDate)
      .sort((a, b) => a.scheduleDate.localeCompare(b.scheduleDate));

    if (!lastVisitDate && futureMeetings.length === 0) {
      container.style.display = 'none';
      return;
    }

    const statusLabel = m => m.actualDate ? '実績済' : '予定';
    const dash = v => v || '-';

    let html = '';

    if (lastVisitDate) {
      html += `<div style="margin-bottom: 8px; font-size: 0.95rem;">
        <strong>直近の訪問日時：</strong>${lastVisitDate}
      </div>`;
    }

    if (lastMeeting) {
      html += `<div style="margin-bottom: 4px; font-size: 0.9rem; color: var(--light-text-color);">最後の実績商談</div>
        <table class="main-table" style="margin-bottom: 12px; font-size: 0.85rem;">
          <thead><tr><th>ステータス</th><th>商談予定日</th><th>商談実施日</th><th>担当者</th><th>商談目的</th></tr></thead>
          <tbody><tr>
            <td>${statusLabel(lastMeeting)}</td>
            <td>${dash(lastMeeting.scheduleDate)}</td>
            <td>${dash(lastMeeting.actualDate)}</td>
            <td>${dash(lastMeeting.handler)}</td>
            <td>${dash(lastMeeting.purpose)}</td>
          </tr></tbody>
        </table>`;
    }

    if (futureMeetings.length > 0) {
      const rows = futureMeetings.map(m => `<tr>
        <td>${statusLabel(m)}</td>
        <td>${dash(m.scheduleDate)}</td>
        <td>${dash(m.actualDate)}</td>
        <td>${dash(m.handler)}</td>
        <td>${dash(m.purpose)}</td>
      </tr>`).join('');

  async function handleScheduleSubmit(event) {
    event.preventDefault();

    // 顧客名から顧客IDを取得
    const customerName = document.getElementById('schedule-customer-name').value;
    const customer = allCustomers.find(c => c.name === customerName);

    if (!customer) {
      alert('顧客が見つかりません。正しい顧客名を選択してください。');
      return;
    }
    if (customer.isHidden) {
      alert('OLD登録済みの顧客には商談登録できません。');
      return;
    }

    const _scheduleHandlerName = document.getElementById('schedule-handler').value;
    const _scheduleHandlerEmp = (allEmployees || []).find(e => e.name === _scheduleHandlerName);
    const scheduleData = {
      scheduleDate: document.getElementById('schedule-date').value,
      customerId: customer.id,
      customerName: customerName,
      handler: _scheduleHandlerName,
      handlerCode: _scheduleHandlerEmp ? _scheduleHandlerEmp.code : (currentUser.handlerCode || ''),
      appointment: document.getElementById('schedule-appointment').value,
      purpose: document.getElementById('schedule-purpose').value,
      details: document.getElementById('schedule-details').value
    };

    try {
      const result = await runGas('addMeetingSchedule', scheduleData);
      allMeetings = [];
      Object.keys(customerDetailCache).forEach(k => delete customerDetailCache[k]);
      closeModal();
      await navigateAfterMeetingRegistration();
      const msgContainer = document.getElementById('meeting-message-container');
      msgContainer.innerHTML = `<div class="success-message">${result.message}</div>`;
      setTimeout(() => msgContainer.innerHTML = '', 5000);
    } catch(error) {
      alert('エラーが発生しました: ' + error.message);
    }
  }

  function closeModal(event) {
    if (event && event.target !== event.currentTarget) return;

  /**
   * スライドパネルを開く
   */
  function openSlidePanel(meetingId, mode = 'view') {
    const meeting = allMeetings.find(m => String(m.id) === String(meetingId));
    if (!meeting) {
      alert('対象の商談データが見つかりません。');
      return;
    }

    const panelBody = document.getElementById('slide-panel-body');
    const panelFooter = document.getElementById('slide-panel-footer');

    if (mode === 'edit' || mode === true) {
      // 編集モード（予定・実績両方編集可能）
      renderEditMode(meeting);
    } else if (mode === 'result') {
      // 実績登録モード（予定は読み取り専用、実績のみ編集可能）
      renderResultMode(meeting);
    } else {
      // 詳細表示モード（読み取り専用）
      renderViewMode(meeting);
    }

    // パネルとオーバーレイを表示
    document.getElementById('slide-panel-overlay').classList.add('active');
  }

  /**
   * スライドパネルを閉じる
   */
  function closeSlidePanel(event) {
    // オーバーレイをクリックした場合のみ閉じる（パネル内のクリックでは閉じない）
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('slide-panel-overlay').classList.remove('active');
  }

  /**

   */
  async function handlePanelEditSubmit(meetingId) {
    const form = document.getElementById('panel-edit-form');
    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    // 未来日付チェック
    const editActualDate = document.getElementById('panel-actual-date').value;
    const todayStr = new Date().toISOString().split('T')[0];
    if (editActualDate && editActualDate > todayStr) {
      await customAlert('未来の日付には実績登録できません。', '入力エラー');
      return;
    }

    // 顧客名から顧客IDを取得
    const customerName = document.getElementById('panel-customer-name').value;
    const customer = allCustomers.find(c => c.name === customerName);

    if (!customer) {
      alert('顧客が見つかりません。正しい顧客名を選択してください。');
      return;
    }

    const _panelHandlerName = document.getElementById('panel-handler').value;
    const _panelHandlerEmp = (allEmployees || []).find(e => e.name === _panelHandlerName);
    const meetingData = {
      meetingId: meetingId,
      scheduleDate: document.getElementById('panel-schedule-date').value,
      customerId: customer.id,
      customerName: customerName,
      handler: _panelHandlerName,
      handlerCode: _panelHandlerEmp ? _panelHandlerEmp.code : '',
      appointment: document.getElementById('panel-appointment').value,
      purpose: document.getElementById('panel-purpose').value,
      details: document.getElementById('panel-details').value,
      actualDate: document.getElementById('panel-actual-date').value || null,
      notes: document.getElementById('panel-notes').value,
      delayReason: document.getElementById('panel-delay-reason')?.value || ''
    };

    try {
      const result = await runGas('updateMeeting', meetingData);
      allMeetings = [];
      Object.keys(customerDetailCache).forEach(k => delete customerDetailCache[k]);
      closeSlidePanel();
      await navigateAfterMeetingRegistration();
      const msgContainer = document.getElementById('meeting-message-container');
      msgContainer.innerHTML = `<div class="success-message">${result.message}</div>`;
      setTimeout(() => msgContainer.innerHTML = '', 5000);
    } catch(error) {
      alert('エラーが発生しました: ' + error.message);
    }
  }

  /**

   * @param {number} direction - -1 (前へ), 0 (今日), 1 (次へ)
   */
  function navigateCalendar(direction) {
    const d = currentDateForCalendar;
    if (direction === 0) {
      currentDateForCalendar = new Date(); // 今日
    } else if (currentCalendarView === 'month') {
      d.setMonth(d.getMonth() + direction);
    } else { // 'week'
      d.setDate(d.getDate() + (7 * direction));
    }
    renderCalendar();
  }

  /**
   * カレンダーのメイン描画関数
   */
  function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    const title = document.getElementById('calendar-title');
    const headerRow = document.getElementById('calendar-header-row');
    grid.innerHTML = ''; // グリッドをクリア
    
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    // 曜日のヘッダーを描画 (日〜土)
    const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
    headerRow.innerHTML = weekdays.map(day => `<div class="calendar-header-cell">${day}</div>`).join('');
    headerRow.style.display = 'grid'; // grid として表示
    headerRow.style.gridTemplateColumns = 'repeat(7, 1fr)';

    let dateList = []; // カレンダーに表示する日付(Dateオブジェクト)の配列
    let startDate, endDate;

    if (currentCalendarView === 'month') {
      // --- 月表示 ---
      const year = currentDateForCalendar.getFullYear();
      const month = currentDateForCalendar.getMonth(); // 0-11
      
      title.textContent = `${year}年 ${month + 1}月`;
      
      const firstDayOfMonth = new Date(year, month, 1);
      const lastDayOfMonth = new Date(year, month + 1, 0);
      
      startDate = new Date(firstDayOfMonth);
      startDate.setDate(startDate.getDate() - firstDayOfMonth.getDay()); // 週の最初の日曜日に移動
      
      endDate = new Date(lastDayOfMonth);
      endDate.setDate(endDate.getDate() + (6 - lastDayOfMonth.getDay())); // 週の最後の土曜日に移動
      
    } else {
      // --- 週表示 ---
      const d = new Date(currentDateForCalendar);
      const dayOfWeek = d.getDay(); // 0 (日) - 6 (土)
      
      startDate = new Date(d);
      startDate.setDate(d.getDate() - dayOfWeek); // 週の最初の日曜日に移動
      
      endDate = new Date(startDate);
      endDate.setDate(startDate.getDate() + 6); // 週の最後の土曜日に移動
      
      title.textContent = `${startDate.getFullYear()}年${startDate.getMonth() + 1}月${startDate.getDate()}日 - ${endDate.getFullYear()}年${endDate.getMonth() + 1}月${endDate.getDate()}日`;
    }

    // startDate から endDate までの日付配列を作成
    let currentDate = new Date(startDate);
    while (currentDate <= endDate) {
      dateList.push(new Date(currentDate));
      currentDate.setDate(currentDate.getDate() + 1);
    }

    // カレンダー表示用のフィルター適用
    const divisionFilter = document.getElementById('calendar-division-filter')?.value || '';
    const deptFilter = document.getElementById('calendar-dept-filter')?.value || '';
    const employeeFilter = document.getElementById('calendar-employee-filter')?.value || '';

    let filteredMeetings = allMeetings;
    if (divisionFilter) {
      filteredMeetings = filteredMeetings.filter(m => m.division === divisionFilter);
    }
    if (deptFilter) {
      filteredMeetings = filteredMeetings.filter(m => m.department === deptFilter);
    }
    if (employeeFilter) {
      filteredMeetings = filteredMeetings.filter(m => m.handler === employeeFilter);
    }

    // --- カレンダーセルを描画 ---
    dateList.forEach(date => {
      const yyyymmdd = formatDateForCompare(date); // "yyyy-MM-dd" 形式

      // この日の予定（商談予定日）と実績（商談実施日）をフィルタリング
      const scheduledMeetings = filteredMeetings.filter(m => m.scheduleDate === yyyymmdd);
      const completedMeetings = filteredMeetings.filter(m => m.actualDate === yyyymmdd);

      let cellClasses = 'calendar-day-cell';
      if (date.getMonth() !== currentDateForCalendar.getMonth() && currentCalendarView === 'month') {
        cellClasses += ' other-month';
      }
      if (yyyymmdd === formatDateForCompare(today)) {
        cellClasses += ' today';
      }

      // 予定側のHTMLを生成
      const scheduledHtml = scheduledMeetings.map((m, index) => {
        const displayName = currentCalendarView === 'week'
          ? `${m.customerName} (${m.handler})`
          : m.customerName;

        // 実績があれば○、過去日付で実績なしなら✕、未来日付で実績なしなら無印
        const isPastDay = yyyymmdd < formatDateForCompare(today);
        const resultMark = m.actualDate ? '○' : (isPastDay ? '✕' : '');
        const markColor = m.actualDate ? 'var(--success-color)' : 'var(--danger-color)';

        const escapedMeetingData = JSON.stringify(m).replace(/"/g, '&quot;');

        return `<div class="calendar-event" style="font-size: 0.7em; cursor: pointer;"
                     data-meeting='${escapedMeetingData}'
                     onclick="openSlidePanel('${m.id}', false)"
                     onmouseenter="showMeetingTooltipFromElement(event, this)"
                     onmouseleave="hideMeetingTooltip()">
                  <span style="color: ${markColor}; font-weight: bold;">${resultMark}</span>
                  <span style="color: inherit; text-decoration: none;">${displayName}</span>
                </div>`;
      }).join('');

      // 実績側のHTMLを生成
      const completedHtml = completedMeetings.map((m, index) => {
        const displayName = currentCalendarView === 'week'
          ? `${m.customerName} (${m.handler})`
          : m.customerName;

        const escapedMeetingData = JSON.stringify(m).replace(/"/g, '&quot;');

        return `<div class="calendar-event" style="font-size: 0.7em; cursor: pointer;"
                     data-meeting='${escapedMeetingData}'
                     onclick="openSlidePanel('${m.id}', false)"
                     onmouseenter="showMeetingTooltipFromElement(event, this)"
                     onmouseleave="hideMeetingTooltip()">
                  <span style="color: var(--success-color); font-weight: bold;">○</span>
                  <span style="color: inherit; text-decoration: none;">${displayName}</span>
                </div>`;
      }).join('');

      // セル全体のHTML（上下分割：予定が上、実績が下）
      grid.innerHTML += `
        <div class="${cellClasses}">
          <div class="day-number">${date.getDate()}</div>
          <div style="display: flex; flex-direction: column; min-height: calc(100% - 25px);">
            <div style="padding: 2px; border-bottom: 1px solid var(--border-color);">
              <div style="font-size: 0.7em; color: var(--light-text-color); margin-bottom: 2px;">予定</div>
              ${scheduledHtml}
            </div>
            <div style="padding: 2px;">
              <div style="font-size: 0.7em; color: var(--light-text-color); margin-bottom: 2px;">実績</div>
              ${completedHtml}
            </div>
          </div>
        </div>
      `;
    });

    // 「今日」ボタンのテキストを現在のビューに合わせて設定
    const todayBtn = document.getElementById('btn-today');
    if (todayBtn) {
      todayBtn.textContent = currentCalendarView === 'month' ? '今月' : '今週';
    }
  }

  /**
   * Dateオブジェクトを "yyyy-MM-dd" 形式の文字列に変換します。
   */
  function formatDateForCompare(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

    // 既存のツールチップを削除

    const meetingData = element.getAttribute('data-meeting');

    try {
      const meeting = JSON.parse(meetingData);
      showMeetingTooltipWithData(event, meeting);

    const rect = tooltip.getBoundingClientRect();

  /**
   * カレンダーCSVの出力を実行します。
   */
  async function executeCalendarCsvExport(event) {
    event.preventDefault();

    const targetMonth = document.getElementById('csv-target-month').value;

    if (!targetMonth) {
      alert('対象月を選択してください');
      return;
    }

    // 商談データが読み込まれていない場合は読み込む
    if (!allMeetings || allMeetings.length === 0) {
      try {
        allMeetings = await runGas('getMeetings');
        if (!allMeetings || allMeetings.length === 0) {
          alert('商談データが見つかりません');
          return;
        }
      } catch (error) {
        alert('商談データの取得に失敗しました: ' + error.message);
        return;
      }
    }

    // 対象月の開始日と終了日を計算
    const [year, month] = targetMonth.split('-').map(Number);
    const startDate = new Date(year, month - 1, 1);
    const endDate = new Date(year, month, 0); // 月の最終日

    const startDateStr = formatDateForCompare(startDate);
    const endDateStr = formatDateForCompare(endDate);

    // 対象月のすべての日付を生成
    const dates = [];
    const currentDate = new Date(startDate);

    while (currentDate <= endDate) {
      dates.push(formatDateForCompare(currentDate));
      currentDate.setDate(currentDate.getDate() + 1);
    }

    // 画面のフィルタを取得
    const selectedDivision = document.getElementById('calendar-division-filter').value;
    const selectedDept = document.getElementById('calendar-dept-filter').value;
    const selectedEmployee = document.getElementById('calendar-employee-filter').value;

    // 担当者別にデータを分類
    const handlerData = {};

    // 担当者を抽出（画面のフィルタを適用）
    const allHandlers = new Set();
    allMeetings.forEach(m => {
      // フィルタ条件をチェック
      if (selectedEmployee && m.handler !== selectedEmployee) return;

      // 部署・大区分フィルタを適用（allEmployeesから担当者情報を取得）
      if (selectedDivision || selectedDept) {
        const employee = allEmployees.find(e => e.name === m.handler);
        if (employee) {
          if (selectedDivision && employee.division !== selectedDivision) return;
          if (selectedDept && employee.department !== selectedDept) return;
        }
      }

      allHandlers.add(m.handler);
    });

    // 各担当者のデータ構造を初期化
    allHandlers.forEach(handler => {
      handlerData[handler] = {};
      dates.forEach(date => {
        handlerData[handler][date] = {
          scheduled: [],  // 予定
          actual: []      // 実績
        };
      });
    });

    // 商談データを分類（フィルタ適用済みの担当者のみ）
    allMeetings.forEach(meeting => {
      const handler = meeting.handler;

      // フィルタされた担当者のみ処理
      if (!allHandlers.has(handler)) return;

      // アポ有無の表示形式を統一
      const appointmentText = meeting.appointment || '未定';
      const rank = meeting.rank || '-';
      const customerName = meeting.customerName || '';

      const meetingInfo = `${appointmentText} ${rank} ${customerName}`;

      // 予定日のデータを追加
      if (meeting.scheduleDate && meeting.scheduleDate >= startDateStr && meeting.scheduleDate <= endDateStr) {
        if (!handlerData[handler]) {
          handlerData[handler] = {};
          dates.forEach(date => {
            handlerData[handler][date] = { scheduled: [], actual: [] };
          });
        }
        if (handlerData[handler][meeting.scheduleDate]) {
          handlerData[handler][meeting.scheduleDate].scheduled.push(meetingInfo);
        }
      }

      // 実績日のデータを追加
      if (meeting.actualDate && meeting.actualDate >= startDateStr && meeting.actualDate <= endDateStr) {
        if (!handlerData[handler]) {
          handlerData[handler] = {};
          dates.forEach(date => {
            handlerData[handler][date] = { scheduled: [], actual: [] };
          });
        }
        if (handlerData[handler][meeting.actualDate]) {
          handlerData[handler][meeting.actualDate].actual.push(meetingInfo);
        }
      }
    });

    // CSVデータを生成
    const csvLines = [];

    // 担当者ごとにカレンダーを作成
    const sortedHandlers = Array.from(allHandlers).sort();

    sortedHandlers.forEach((handler, handlerIndex) => {
      // 担当者の見出し
      if (handlerIndex > 0) {
        csvLines.push(''); // 担当者間に空行を追加
      }
      csvLines.push(`[担当者: ${handler}]`);
      csvLines.push(''); // 見出しと表の間に空行

      // 週ごとにカレンダーを作成
      const firstDate = new Date(dates[0]);
      const firstDayOfWeek = firstDate.getDay(); // 0=日曜, 1=月曜, ...

      // 月の最初の日が何曜日から始まるかに応じて、週の開始を調整
      let weekStart = 0;

      for (let weekIndex = 0; weekIndex < Math.ceil((dates.length + firstDayOfWeek) / 7); weekIndex++) {
        const weekDates = [];

        // その週の日付を収集（最大7日）
        for (let dayIndex = 0; dayIndex < 7; dayIndex++) {
          const dateIndex = weekIndex * 7 + dayIndex - firstDayOfWeek;
          if (dateIndex >= 0 && dateIndex < dates.length) {
            weekDates.push(dates[dateIndex]);
          } else {
            weekDates.push(null); // 空のセル
          }
        }

        // 日付行を作成（各日付が2列分のスペースを取る）
        const dateRow = [];
        weekDates.forEach(dateStr => {
          if (dateStr) {
            const date = new Date(dateStr);
            const dayLabel = `${date.getMonth() + 1}/${date.getDate()}`;
            dateRow.push(dayLabel);
            dateRow.push(''); // 結合用の空セル
          } else {
            dateRow.push('');
            dateRow.push('');
          }
        });
        csvLines.push(dateRow.join(','));

        // 予定・実績ヘッダー行
        const headerRow = [];
        weekDates.forEach(dateStr => {
          if (dateStr) {
            headerRow.push('予定');
            headerRow.push('実績');
          } else {
            headerRow.push('');
            headerRow.push('');
          }
        });
        csvLines.push(headerRow.join(','));

        // その週の最大行数を計算
        let maxRows = 0;
        weekDates.forEach(dateStr => {
          if (dateStr && handlerData[handler][dateStr]) {
            const dayData = handlerData[handler][dateStr];
            maxRows = Math.max(maxRows, dayData.scheduled.length, dayData.actual.length);
          }
        });

        // データ行を作成（案件ごとに1行）
        for (let rowIndex = 0; rowIndex < maxRows; rowIndex++) {
          const dataRow = [];
          weekDates.forEach(dateStr => {
            if (dateStr && handlerData[handler][dateStr]) {
              const dayData = handlerData[handler][dateStr];

              // 予定列
              const scheduledText = dayData.scheduled[rowIndex] || '';
              dataRow.push(escapeCsvCell(scheduledText));

              // 実績列
              const actualText = dayData.actual[rowIndex] || '';
              dataRow.push(escapeCsvCell(actualText));
            } else {
              dataRow.push('');
              dataRow.push('');
            }
          });
          csvLines.push(dataRow.join(','));
        }

        // 週と週の間に空行を追加
        csvLines.push('');
      }
    });

    // CSVテキストを結合
    const csvText = csvLines.join('\n');

    // BOM付きUTF-8でダウンロード
    const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
    const blob = new Blob([bom, csvText], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);

    const fileName = `商談カレンダー_${year}年${String(month).padStart(2, '0')}月.csv`;
    link.setAttribute('href', url);
    link.setAttribute('download', fileName);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    // モーダルを閉じる
    closeModal(event);
  }

  /**
   * カレンダーExcelの出力を実行します。
   */
  async function executeCalendarExcelExport(event) {

    const targetMonth = document.getElementById('excel-target-month').value;

    if (!targetMonth) {

    // 画面のフィルタを取得

  const EXCEL_PROGRESS_STAGES = [
    'データを取得中...',
    '担当者・商談データを整理中...',
    'カレンダーシートを作成中...',
    'データを書き込み中...',

  let _excelProgressTimer = null;
  let _excelProgressStage = 0;

  function showExcelProgressModal() {
    _excelProgressStage = 0;
    document.body.insertAdjacentHTML('beforeend', `
      <div id="excel-progress-overlay" style="
          position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:99999;
          display:flex;align-items:center;justify-content:center;">
        <div style="background:#fff;border-radius:8px;padding:28px 32px;min-width:320px;max-width:400px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
          <div style="font-size:1.05rem;font-weight:bold;color:#1a237e;margin-bottom:18px;">

          </div>
          <div style="background:#e0e0e0;border-radius:4px;height:10px;margin-bottom:14px;overflow:hidden;">
            <div id="excel-progress-bar" style="background:#1a237e;height:10px;border-radius:4px;width:5%;transition:width 0.6s ease;"></div>
          </div>
          <div id="excel-progress-msg" style="color:#555;font-size:0.88rem;">${EXCEL_PROGRESS_STAGES[0]}</div>
        </div>
      </div>
    `);
    const total = EXCEL_PROGRESS_STAGES.length;
    _excelProgressTimer = setInterval(() => {
      if (_excelProgressStage < total - 1) {
        _excelProgressStage++;
        const pct = Math.round((_excelProgressStage / total) * 80) + 5;
        const bar = document.getElementById('excel-progress-bar');
        const msg = document.getElementById('excel-progress-msg');
        if (bar) bar.style.width = pct + '%';
        if (msg) msg.textContent = EXCEL_PROGRESS_STAGES[_excelProgressStage];
      }
    }, 2500);
  }

  function completeExcelProgressModal() {
    clearInterval(_excelProgressTimer);
    const bar = document.getElementById('excel-progress-bar');
    const msg = document.getElementById('excel-progress-msg');
    if (bar) bar.style.width = '100%';
    if (msg) msg.textContent = '完了！';
    setTimeout(() => {
      const el = document.getElementById('excel-progress-overlay');
      if (el) el.remove();
    }, 700);
  }

  function closeExcelProgressModal() {
    clearInterval(_excelProgressTimer);
    const el = document.getElementById('excel-progress-overlay');
    if (el) el.remove();
  }

  function copyDownloadUrl() {
    const input = document.getElementById('download-url-input');
    if (!input) return;
    const url = input.value;
    const showSuccess = () => {
      const msg = document.getElementById('url-copy-success');
      if (msg) { msg.style.display = 'block'; setTimeout(() => { msg.style.display = 'none'; }, 2000); }
    };
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(showSuccess).catch(() => {
        input.select(); document.execCommand('copy'); showSuccess();
      });
    } else {
      input.select(); document.execCommand('copy'); showSuccess();
    }
  }

  /**
   * CSVセルの値をエスケープします。
   */
  function escapeCsvCell(text) {
    if (!text) return '';

    const cellStr = String(text);
    // セルに改行、カンマ、ダブルクォートが含まれる場合はダブルクォートで囲む
    if (cellStr.includes(',') || cellStr.includes('\n') || cellStr.includes('"')) {
      return '"' + cellStr.replace(/"/g, '""') + '"';
    }
    return cellStr;
  }

        showLoader(false);
        alert('エラー: ' + error.message);

    backdrop.onclick = () => {
      modal.remove();
      backdrop.remove();
    };
